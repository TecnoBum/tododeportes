<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Deportes – Resultados en vivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            /* ── Modo claro ─────────────── */
            --bg: #f4f6f9;
            --surface: #ffffff;
            --surface2: #f0f2f5;
            --surface3: #e2e6eb;
            --text: #1a1a2e;
            --text2: #5a6470;
            --accent: #3b82f6;
            --accent2: #2563eb;
            --live: #e11d48;
            --live-bg: #ffe4e6;
            --live-text: #9f1239;
            --fin: #0d9488;
            --fin-bg: #ccfbf1;
            --fin-text: #115e59;
            --sched: #d97706;
            --sched-bg: #fef3c7;
            --sched-text: #92400e;
            --border: #dde1e6;
            --radius: 14px;
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
            --transition: 0.2s ease;
            --ticker-bg: #e9ecf0;
            --ticker-text: #1e293b;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.5;
        }

        /* ── Header ──────────────────────── */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 120;
            backdrop-filter: blur(12px);
            gap: 12px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            flex-shrink: 0;
        }
        .brand i { color: var(--accent); font-size: 1.4rem; }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.75rem;
            color: var(--text2);
            background: var(--surface2);
            padding: 5px 12px;
            border-radius: 20px;
        }
        .live-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--live);
            animation: pulse 1.8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(225,29,72,0.7); }
            50% { opacity:0.5; box-shadow: 0 0 0 10px rgba(225,29,72,0); }
        }

        /* ── Cintillo / Ticker ──────────── */
        .ticker-wrap {
            background: var(--ticker-bg);
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            position: sticky;
            top: 55px;
            z-index: 110;
            height: 34px;
            display: flex;
            align-items: center;
        }
        .ticker-label {
            background: var(--live);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 6px 14px;
            z-index: 2;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            height: 100%;
        }
        .ticker-label i { font-size: 0.65rem; }
        .ticker-track {
            display: flex;
            animation: tickerScroll 40s linear infinite;
            white-space: nowrap;
            gap: 4px;
            align-items: center;
            height: 100%;
        }
        .ticker-track:hover { animation-play-state: paused; }
        @keyframes tickerScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 14px;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            letter-spacing: -0.2px;
            color: var(--ticker-text);
        }
        .ticker-item .score-mini {
            color: var(--live);
            font-weight: 700;
        }
        .ticker-item .dot-sep {
            width: 3px; height: 3px;
            border-radius: 50%;
            background: var(--text2);
            opacity: 0.5;
        }

        /* ── Navegación deportes ────────── */
        .sport-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            white-space: nowrap;
            padding: 7px 14px;
            display: flex;
            gap: 5px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            position: sticky;
            top: 89px;
            z-index: 100;
        }
        .sport-nav::-webkit-scrollbar { display: none; }
        .sport-tab {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            border-radius: 22px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text2);
            background: transparent;
            border: 1px solid transparent;
            transition: all var(--transition);
            flex-shrink: 0;
            letter-spacing: -0.2px;
        }
        .sport-tab:hover { background: var(--surface2); color: #000; }
        .sport-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 700;
            box-shadow: 0 4px 14px rgba(59,130,246,0.35);
        }
        .sport-tab i { font-size: 0.95rem; width: 18px; text-align: center; }

        /* ── Contenido principal ────────── */
        .main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 16px;
        }
        .panel { display: none; animation: fadeIn 0.25s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn {
            from { opacity:0; transform: translateY(6px); }
            to { opacity:1; transform: translateY(0); }
        }

        /* ── Filtros y resumen ──────────── */
        .panel-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
        }
        .section-title i { color: var(--accent); font-size: 1.3rem; }
        .filter-group {
            display: flex;
            gap: 4px;
            margin-left: auto;
            background: var(--surface2);
            border-radius: 20px;
            padding: 3px;
        }
        .filter-btn {
            padding: 6px 14px;
            border-radius: 18px;
            border: none;
            background: transparent;
            color: var(--text2);
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .filter-btn.active {
            background: var(--accent);
            color: #fff;
        }
        .summary-bar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            font-size: 0.75rem;
            color: var(--text2);
        }
        .summary-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .summary-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .summary-dot.live-dot { background: var(--live); }
        .summary-dot.fin-dot { background: var(--fin); }
        .summary-dot.sched-dot { background: var(--sched); }

        /* ── Tarjeta de partido ─────────── */
        .match-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .match-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }
        .match-card.flash-update {
            animation: flashBorder 2s ease-out;
        }
        @keyframes flashBorder {
            0% { border-color: var(--accent); box-shadow: 0 0 20px rgba(59,130,246,0.5); }
            100% { border-color: var(--border); box-shadow: none; }
        }
        .match-main {
            display: grid;
            grid-template-columns: 1fr auto 1fr auto;
            align-items: center;
            gap: 12px;
        }
        .team {
            font-weight: 600;
            font-size: 0.92rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .team.home { text-align: right; }
        .team.away { text-align: left; }
        .score-box {
            font-size: 1.45rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-align: center;
            min-width: 72px;
            background: var(--surface2);
            border-radius: 10px;
            padding: 7px 4px;
            color: var(--text);
            transition: all 0.3s;
        }
        .score-box.live-score {
            background: #ffe4e6;
            color: var(--live);
            animation: pulseScore 2s ease-in-out infinite;
        }
        @keyframes pulseScore {
            0%,100% { color:#1a1a2e; }
            50% { color:var(--live); }
        }
        .state-badge {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 5px 11px;
            border-radius: 20px;
            white-space: nowrap;
            text-align: center;
            min-width: 60px;
        }
        .state-badge.live { background: var(--live-bg); color: var(--live-text); }
        .state-badge.finished { background: var(--fin-bg); color: var(--fin-text); }
        .state-badge.scheduled { background: var(--sched-bg); color: var(--sched-text); }

        /* ── Detalle expandible ─────────── */
        .match-detail {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--text2);
            gap: 10px;
            flex-wrap: wrap;
        }
        .match-card.expanded .match-detail { display: flex; }
        .detail-chip {
            background: var(--surface2);
            padding: 6px 12px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            color: var(--text);
        }
        .detail-chip i { color: var(--accent); font-size: 0.75rem; }

        /* ── Estado vacío / error ───────── */
        .loader {
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .empty {
            text-align: center;
            padding: 50px 20px;
            color: var(--text2);
        }
        .empty i { font-size: 2.6rem; display: block; margin-bottom: 12px; opacity: 0.5; }
        .empty p { margin-bottom: 8px; font-size: 0.9rem; }
        .retry-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 22px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            font-size: 0.82rem;
            transition: background var(--transition);
        }
        .retry-btn:hover { background: var(--accent2); }

        /* ── Responsive ─────────────────── */
        @media (max-width: 768px) {
            .header { padding: 10px 14px; }
            .brand { font-size: 1.1rem; }
            .ticker-wrap { top: 49px; }
            .sport-nav { top: 83px; padding: 5px 8px; }
            .sport-tab { padding: 7px 12px; font-size: 0.75rem; gap: 5px; }
            .main { padding: 10px; }
            .match-main { grid-template-columns: 1fr auto 1fr; gap: 8px; }
            .state-badge { grid-column: 1/-1; justify-self: center; margin-top: 6px; }
            .team { font-size: 0.8rem; }
            .score-box { font-size: 1.2rem; min-width: 58px; padding: 5px 2px; }
            .filter-group { margin-left: 0; margin-top: 6px; }
        }
        @media (max-width: 420px) {
            .sport-tab { padding: 6px 10px; font-size: 0.68rem; }
            .match-card { padding: 10px 8px; }
            .team { font-size: 0.72rem; }
            .score-box { font-size: 1rem; min-width: 48px; }
            .ticker-track { animation-duration: 25s; }
        }
    </style>
</head>
<body>

    <!-- ── Cabecera ──────────────────────── -->
    <header class="header">
        <div class="brand">
            <!-- Icono de copa eliminado según la solicitud -->
            <span>Todo Deportes</span>
        </div>
        <div class="header-right">
            <span class="live-indicator">
                <span class="live-dot"></span>
                <span id="liveTime">Actualizando…</span>
            </span>
        </div>
    </header>

    <!-- ── Cintillo de datos en tiempo real ─ -->
    <div class="ticker-wrap" id="tickerWrap">
        <span class="ticker-label" id="tickerLabel"><i class="fa-solid fa-bolt"></i> EN VIVO</span>
        <div class="ticker-track" id="tickerTrack"></div>
    </div>

    <!-- ── Navegación de deportes ────────── -->
    <nav class="sport-nav" id="sportNav"></nav>

    <!-- ── Contenido ─────────────────────── -->
    <main class="main" id="mainContent"></main>

    <script>
        (function() {
            // ═══════════════════════════════════════════
            // CONFIGURACIÓN
            // ═══════════════════════════════════════════
            const CONFIG = {
                INTERVALO_REFRESCO: 35000,
                VIDA_CACHE: 30000,
                INTERVALO_TICKER: 20000,
                API_BASE: 'https://site.api.espn.com/apis/site/v2/sports',
                DEPORTES: [
                    // MLB movida a la primera posición
                    { id: 'baseball-mlb', nombre: 'MLB', icon: 'fa-baseball', sport: 'baseball',
                        league: 'mlb', pais: 'EE.UU.' },
                    { id: 'football-nfl', nombre: 'NFL', icon: 'fa-football', sport: 'football',
                        league: 'nfl', pais: 'EE.UU.' },
                    { id: 'basketball-nba', nombre: 'NBA', icon: 'fa-basketball', sport: 'basketball',
                        league: 'nba', pais: 'EE.UU.' },
                    { id: 'hockey-nhl', nombre: 'NHL', icon: 'fa-hockey-puck', sport: 'hockey',
                    league: 'nhl', pais: 'EE.UU.' },
                    { id: 'soccer-epl', nombre: 'Premier League', icon: 'fa-futbol', sport: 'soccer',
                        league: 'eng.1', pais: 'Inglaterra' },
                    { id: 'soccer-laliga', nombre: 'LaLiga', icon: 'fa-futbol', sport: 'soccer',
                        league: 'esp.1', pais: 'España' },
                    { id: 'soccer-seriea', nombre: 'Serie A', icon: 'fa-futbol', sport: 'soccer',
                        league: 'ita.1', pais: 'Italia' },
                    { id: 'soccer-bundesliga', nombre: 'Bundesliga', icon: 'fa-futbol', sport: 'soccer',
                        league: 'ger.1', pais: 'Alemania' },
                    { id: 'soccer-ligue1', nombre: 'Ligue 1', icon: 'fa-futbol', sport: 'soccer',
                        league: 'fra.1', pais: 'Francia' },
                    { id: 'soccer-mls', nombre: 'MLS', icon: 'fa-futbol', sport: 'soccer', league: 'usa.1',
                        pais: 'EE.UU.' },
                    { id: 'soccer-ucl', nombre: 'Champions League', icon: 'fa-trophy', sport: 'soccer',
                        league: 'uefa.champions', pais: 'Europa' },
                    { id: 'tennis-atp', nombre: 'ATP Tenis', icon: 'fa-tennis', sport: 'tennis',
                    league: 'atp', pais: 'Mundial' },
                    { id: 'tennis-wta', nombre: 'WTA Tenis', icon: 'fa-tennis', sport: 'tennis',
                    league: 'wta', pais: 'Mundial' },
                    { id: 'racing-f1', nombre: 'F1', icon: 'fa-flag-checkered', sport: 'racing',
                    league: 'f1', pais: 'Mundial' },
                    { id: 'mma-ufc', nombre: 'UFC', icon: 'fa-hand-fist', sport: 'mma', league: 'ufc',
                        pais: 'Mundial' },
                    { id: 'boxing', nombre: 'Boxeo', icon: 'fa-boxing-glove', sport: 'boxing',
                        league: 'top-rank', pais: 'Mundial' },
                ],
            };

            // ═══════════════════════════════════════════
            // ESTADO GLOBAL
            // ═══════════════════════════════════════════
            const STATE = {
                deporteActivo: CONFIG.DEPORTES[0].id,
                filtroActivo: 'todos',
                cache: {},
                tickerData: [],
                marcadoresAnteriores: {},
            };

            // ═══════════════════════════════════════════
            // REFERENCIAS DOM
            // ═══════════════════════════════════════════
            const DOM = {
                nav: document.getElementById('sportNav'),
                main: document.getElementById('mainContent'),
                tickerTrack: document.getElementById('tickerTrack'),
                tickerWrap: document.getElementById('tickerWrap'),
                tickerLabel: document.getElementById('tickerLabel'),
                liveTime: document.getElementById('liveTime'),
            };

            // ═══════════════════════════════════════════
            // UTILIDADES
            // ═══════════════════════════════════════════
            const Util = {
                escaparHTML(str) {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                },
                formatearHora() {
                    return new Date().toLocaleTimeString('es-ES', {
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                },
                obtenerDeporte(id) {
                    return CONFIG.DEPORTES.find(d => d.id === id);
                },
            };

            // ═══════════════════════════════════════════
            // API (con idioma español)
            // ═══════════════════════════════════════════
            const API = {
                async obtenerDatos(deporte) {
                    // Se añade parámetro lang=es para recibir datos en español
                    const url =
                        `${CONFIG.API_BASE}/${deporte.sport}/${deporte.league}/scoreboard?lang=es&limit=60`;
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(`Error HTTP ${resp.status}`);
                    return await resp.json();
                },

                procesarEventos(data) {
                    if (!data.events || !data.events.length) return [];
                    return data.events.map(ev => {
                        const comp = ev.competitions?.[0];
                        if (!comp || !comp.competitors || comp.competitors.length < 2) return null;

                        const local = comp.competitors[0];
                        const visitante = comp.competitors[1];
                        const status = ev.status || {};
                        const state = status.type?.state || 'pre';
                        const detail = status.type?.detail || 'Programado';
                        const shortDetail = status.type?.shortDetail || '';
                        const clock = status.displayClock || '';
                        const period = status.period || '';

                        let claseEstado = 'scheduled';
                        let textoEstado = detail;
                        if (state === 'in') {
                            claseEstado = 'live';
                            textoEstado = clock || shortDetail || 'En vivo';
                        } else if (state === 'post') {
                            claseEstado = 'finished';
                            textoEstado = 'Finalizado';
                        }

                        return {
                            id: ev.id,
                            local: local.team?.displayName || local.team?.shortDisplayName || 'Local',
                            visitante: visitante.team?.displayName || visitante.team?.shortDisplayName ||
                                'Visitante',
                            scoreLocal: local.score ?? '-',
                            scoreVisitante: visitante.score ?? '-',
                            claseEstado,
                            textoEstado,
                            state,
                            detail,
                            shortDetail,
                            clock,
                            period,
                            localRecord: local.records?.[0]?.summary || '',
                            visitanteRecord: visitante.records?.[0]?.summary || '',
                            transmision: comp.broadcasts?.[0]?.names?.[0] || '',
                            sede: comp.venue?.fullName || '',
                        };
                    }).filter(Boolean);
                },
            };

            // ═══════════════════════════════════════════
            // GESTOR DE CACHÉ Y CAMBIOS
            // ═══════════════════════════════════════════
            const CacheManager = {
                guardar(deporteId, partidos) {
                    const anteriores = STATE.marcadoresAnteriores[deporteId] || {};
                    const nuevos = {};
                    partidos.forEach(p => {
                        nuevos[p.id] = `${p.scoreLocal}-${p.scoreVisitante}`;
                    });
                    const cambiados = new Set();
                    for (const [id, marcador] of Object.entries(nuevos)) {
                        if (anteriores[id] && anteriores[id] !== marcador) {
                            cambiados.add(id);
                        }
                    }
                    STATE.marcadoresAnteriores[deporteId] = nuevos;
                    STATE.cache[deporteId] = {
                        partidos,
                        timestamp: Date.now(),
                        cambiados,
                    };
                },

                obtener(deporteId) {
                    return STATE.cache[deporteId] || null;
                },

                esValido(deporteId) {
                    const c = STATE.cache[deporteId];
                    return c && (Date.now() - c.timestamp < CONFIG.VIDA_CACHE);
                },
            };

            // ═══════════════════════════════════════════
            // CONSTRUCTOR DE UI
            // ═══════════════════════════════════════════
            const UIBuilder = {
                construirNavegacion() {
                    DOM.nav.innerHTML = CONFIG.DEPORTES.map(d => `
                        <button class="sport-tab${d.id === STATE.deporteActivo ? ' active' : ''}" 
                                data-id="${d.id}" title="${d.nombre} · ${d.pais}">
                            <i class="fa-solid ${d.icon}"></i>
                            <span>${d.nombre}</span>
                        </button>
                    `).join('');

                    DOM.nav.querySelectorAll('.sport-tab').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (id !== STATE.deporteActivo) {
                                STATE.deporteActivo = id;
                                STATE.filtroActivo = 'todos';
                                this.actualizarTabActivo();
                                this.mostrarPanel(id);
                                App.cargarDeporte(id);
                            }
                        });
                    });
                },

                actualizarTabActivo() {
                    DOM.nav.querySelectorAll('.sport-tab').forEach(b =>
                        b.classList.toggle('active', b.dataset.id === STATE.deporteActivo)
                    );
                    const activo = DOM.nav.querySelector(`[data-id="${STATE.deporteActivo}"]`);
                    if (activo) activo.scrollIntoView({ behavior: 'smooth', block: 'nearest',
                        inline: 'center' });
                },

                construirPaneles() {
                    DOM.main.innerHTML = CONFIG.DEPORTES.map(d => `
                        <div class="panel${d.id === STATE.deporteActivo ? ' active' : ''}" id="panel-${d.id}">
                            <div class="panel-header">
                                <div class="section-title">
                                    <i class="fa-solid ${d.icon}"></i>
                                    <span>${d.nombre}</span>
                                </div>
                                <div class="filter-group" data-panel="${d.id}">
                                    <button class="filter-btn active" data-filtro="todos">Todos</button>
                                    <button class="filter-btn" data-filtro="en-vivo">En vivo</button>
                                    <button class="filter-btn" data-filtro="finalizados">Finalizados</button>
                                </div>
                            </div>
                            <div class="summary-bar" id="summary-${d.id}"></div>
                            <div class="loader" id="loader-${d.id}">
                                <div class="spinner"></div>
                            </div>
                            <div id="partidos-${d.id}"></div>
                        </div>
                    `).join('');

                    DOM.main.querySelectorAll('.filter-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const panelId = e.target.closest('.filter-group').dataset.panel;
                            const filtro = btn.dataset.filtro;
                            STATE.filtroActivo = filtro;
                            const group = e.target.closest('.filter-group');
                            group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            const cacheEntry = STATE.cache[panelId];
                            if (cacheEntry) {
                                this.renderizarPartidos(panelId, cacheEntry.partidos,
                                    cacheEntry.cambiados || new Set());
                            }
                        });
                    });

                    DOM.main.addEventListener('click', (e) => {
                        const card = e.target.closest('.match-card');
                        if (card) {
                            card.classList.toggle('expanded');
                        }
                    });
                },

                mostrarPanel(id) {
                    DOM.main.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                    const panel = document.getElementById('panel-' + id);
                    if (panel) {
                        panel.classList.add('active');
                        const group = panel.querySelector('.filter-group');
                        if (group) {
                            group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                            const todosBtn = group.querySelector('[data-filtro="todos"]');
                            if (todosBtn) todosBtn.classList.add('active');
                        }
                    }
                    STATE.filtroActivo = 'todos';
                },

                renderizarPartidos(deporteId, partidos, cambiados = new Set()) {
                    const contenedor = document.getElementById('partidos-' + deporteId);
                    const loader = document.getElementById('loader-' + deporteId);
                    const summaryBar = document.getElementById('summary-' + deporteId);

                    if (loader) loader.style.display = 'none';

                    let filtrados = partidos;
                    if (STATE.filtroActivo === 'en-vivo') {
                        filtrados = partidos.filter(p => p.claseEstado === 'live');
                    } else if (STATE.filtroActivo === 'finalizados') {
                        filtrados = partidos.filter(p => p.claseEstado === 'finished');
                    }

                    const enVivo = partidos.filter(p => p.claseEstado === 'live').length;
                    const finalizados = partidos.filter(p => p.claseEstado === 'finished').length;
                    const programados = partidos.filter(p => p.claseEstado === 'scheduled').length;
                    if (summaryBar) {
                        summaryBar.innerHTML = `
                            <span class="summary-item"><span class="summary-dot live-dot"></span> ${enVivo} en vivo</span>
                            <span class="summary-item"><span class="summary-dot fin-dot"></span> ${finalizados} finalizados</span>
                            <span class="summary-item"><span class="summary-dot sched-dot"></span> ${programados} programados</span>
                        `;
                    }

                    if (!filtrados.length) {
                        const mensaje = STATE.filtroActivo === 'en-vivo' ?
                            'No hay partidos en vivo ahora' :
                            STATE.filtroActivo === 'finalizados' ?
                            'No hay partidos finalizados' :
                            'No hay partidos en este momento';
                        contenedor.innerHTML = `
                            <div class="empty">
                                <i class="fa-regular fa-calendar-xmark"></i>
                                <p>${mensaje}</p>
                            </div>`;
                        return;
                    }

                    contenedor.innerHTML = filtrados.map(p => {
                        const flashClass = cambiados.has(p.id) ? ' flash-update' : '';
                        const extraInfo = [];
                        if (p.period) extraInfo.push(
                            `<span class="detail-chip"><i class="fa-regular fa-clock"></i> ${p.period}º tiempo</span>`
                            );
                        if (p.clock && p.claseEstado === 'live') extraInfo.push(
                            `<span class="detail-chip"><i class="fa-solid fa-stopwatch"></i> ${p.clock}</span>`
                            );
                        if (p.localRecord) extraInfo.push(
                            `<span class="detail-chip"><i class="fa-solid fa-chart-bar"></i> ${p.localRecord}</span>`
                            );
                        if (p.visitanteRecord) extraInfo.push(
                            `<span class="detail-chip"><i class="fa-solid fa-chart-bar"></i> ${p.visitanteRecord}</span>`
                            );
                        if (p.transmision) extraInfo.push(
                            `<span class="detail-chip"><i class="fa-solid fa-tv"></i> ${p.transmision}</span>`
                            );
                        if (p.sede) extraInfo.push(
                            `<span class="detail-chip"><i class="fa-solid fa-location-dot"></i> ${p.sede}</span>`
                            );

                        return `
                            <div class="match-card${flashClass}" data-match-id="${p.id}">
                                <div class="match-main">
                                    <span class="team home">${Util.escaparHTML(p.local)}</span>
                                    <span class="score-box${p.claseEstado === 'live' ? ' live-score' : ''}">${p.scoreLocal} - ${p.scoreVisitante}</span>
                                    <span class="team away">${Util.escaparHTML(p.visitante)}</span>
                                    <span class="state-badge ${p.claseEstado}">${p.textoEstado}</span>
                                </div>
                                <div class="match-detail">
                                    ${extraInfo.length ? extraInfo.join('') : '<span class="detail-chip"><i class="fa-solid fa-info-circle"></i> Sin detalles adicionales</span>'}
                                </div>
                            </div>
                        `;
                    }).join('');
                },

                mostrarError(deporteId, mensaje = 'Error al cargar los datos.') {
                    const contenedor = document.getElementById('partidos-' + deporteId);
                    const loader = document.getElementById('loader-' + deporteId);
                    if (loader) loader.style.display = 'none';
                    contenedor.innerHTML = `
                        <div class="empty">
                            <i class="fa-solid fa-cloud-bolt"></i>
                            <p>${mensaje}</p>
                            <button class="retry-btn" onclick="TodoDeportes.reintentar('${deporteId}')">
                                <i class="fa-solid fa-rotate-right"></i> Reintentar
                            </button>
                        </div>`;
                },
            };

            // ═══════════════════════════════════════════
            // CINTILLO / TICKER (con fallback a partidos anteriores)
            // ═══════════════════════════════════════════
            const Ticker = {
                actualizar() {
                    const enVivo = [];
                    for (const [deporteId, entry] of Object.entries(STATE.cache)) {
                        const deporte = Util.obtenerDeporte(deporteId);
                        if (!deporte || !entry || !entry.partidos) continue;
                        entry.partidos
                            .filter(p => p.claseEstado === 'live')
                            .forEach(p => {
                                enVivo.push({
                                    ...p,
                                    deporteNombre: deporte.nombre,
                                    deporteIcon: deporte.icon,
                                });
                            });
                    }

                    if (enVivo.length === 0) {
                        // Buscar partidos finalizados (anteriores) de cualquier caché
                        const finalizados = [];
                        for (const [deporteId, entry] of Object.entries(STATE.cache)) {
                            const deporte = Util.obtenerDeporte(deporteId);
                            if (!deporte || !entry || !entry.partidos) continue;
                            entry.partidos
                                .filter(p => p.claseEstado === 'finished')
                                .forEach(p => {
                                    finalizados.push({
                                        ...p,
                                        deporteNombre: deporte.nombre,
                                        deporteIcon: deporte.icon,
                                    });
                                });
                        }

                        if (finalizados.length > 0) {
                            // Mostrar últimos resultados
                            DOM.tickerLabel.innerHTML = '<i class="fa-solid fa-clock-rotate-left"></i> RESULTADOS';
                            const items = finalizados.map(p => `
                                <span class="ticker-item">
                                    <i class="fa-solid ${p.deporteIcon}"></i>
                                    <span>${p.deporteNombre}</span>
                                    <span class="dot-sep"></span>
                                    <span>${Util.escaparHTML(p.local)}</span>
                                    <span class="score-mini">${p.scoreLocal}-${p.scoreVisitante}</span>
                                    <span>${Util.escaparHTML(p.visitante)}</span>
                                    <span class="dot-sep"></span>
                                    <span>Finalizado</span>
                                </span>
                            `).join('');
                            DOM.tickerTrack.innerHTML = items + items;
                            return;
                        }

                        // Si tampoco hay finalizados, mostrar mensaje genérico
                        DOM.tickerLabel.innerHTML = '<i class="fa-solid fa-bolt"></i> EN VIVO';
                        DOM.tickerTrack.innerHTML = `
                            <span class="ticker-item">
                                <span class="dot-sep"></span> No hay partidos en vivo ahora
                                <span class="dot-sep"></span>
                            </span>
                        `;
                        return;
                    }

                    // Si hay en vivo, mantener etiqueta original
                    DOM.tickerLabel.innerHTML = '<i class="fa-solid fa-bolt"></i> EN VIVO';
                    const items = enVivo.map(p => `
                        <span class="ticker-item">
                            <i class="fa-solid ${p.deporteIcon}"></i>
                            <span>${p.deporteNombre}</span>
                            <span class="dot-sep"></span>
                            <span>${Util.escaparHTML(p.local)}</span>
                            <span class="score-mini">${p.scoreLocal}-${p.scoreVisitante}</span>
                            <span>${Util.escaparHTML(p.visitante)}</span>
                            <span class="dot-sep"></span>
                            <span>${p.textoEstado}</span>
                        </span>
                    `).join('');
                    DOM.tickerTrack.innerHTML = items + items;
                },
            };

            // ═══════════════════════════════════════════
            // APLICACIÓN PRINCIPAL
            // ═══════════════════════════════════════════
            const App = {
                async cargarDeporte(deporteId, forzar = false) {
                    const deporte = Util.obtenerDeporte(deporteId);
                    if (!deporte) return;

                    const cacheEntry = CacheManager.obtener(deporteId);
                    const loader = document.getElementById('loader-' + deporteId);

                    if (!forzar && CacheManager.esValido(deporteId)) {
                        UIBuilder.renderizarPartidos(deporteId, cacheEntry.partidos, cacheEntry.cambiados || new Set());
                        if (loader) loader.style.display = 'none';
                        return;
                    }

                    if (!cacheEntry || forzar) {
                        if (loader) loader.style.display = 'flex';
                        const contenedor = document.getElementById('partidos-' + deporteId);
                        if (contenedor && forzar) contenedor.innerHTML = '';
                    }

                    try {
                        const data = await API.obtenerDatos(deporte);
                        const partidos = API.procesarEventos(data);
                        CacheManager.guardar(deporteId, partidos);
                        const entry = CacheManager.obtener(deporteId);
                        UIBuilder.renderizarPartidos(deporteId, partidos, entry?.cambiados || new Set());
                        Ticker.actualizar();
                    } catch (err) {
                        console.warn(`Error en ${deporte.nombre}:`, err.message);
                        if (cacheEntry && cacheEntry.partidos.length) {
                            UIBuilder.renderizarPartidos(deporteId, cacheEntry.partidos);
                        } else {
                            UIBuilder.mostrarError(deporteId,
                                'No se pudieron cargar los datos. Verifica tu conexión.');
                        }
                    }
                },

                refrescarTodo() {
                    this.cargarDeporte(STATE.deporteActivo, true);
                    CONFIG.DEPORTES.forEach(d => {
                        if (d.id !== STATE.deporteActivo && !CacheManager.esValido(d.id)) {
                            this.cargarDeporte(d.id, true);
                        }
                    });
                    Ticker.actualizar();
                    DOM.liveTime.textContent = `Actualizado: ${Util.formatearHora()}`;
                },

                async iniciar() {
                    UIBuilder.construirNavegacion();
                    UIBuilder.construirPaneles();
                    DOM.liveTime.textContent = `Actualizado: ${Util.formatearHora()}`;

                    await this.cargarDeporte(STATE.deporteActivo);
                    setTimeout(() => {
                        CONFIG.DEPORTES.forEach(d => {
                            if (d.id !== STATE.deporteActivo) {
                                this.cargarDeporte(d.id);
                            }
                        });
                    }, 2000);

                    setInterval(() => this.refrescarTodo(), CONFIG.INTERVALO_REFRESCO);
                    setInterval(() => {
                        DOM.liveTime.textContent = `Actualizado: ${Util.formatearHora()}`;
                    }, 1000);
                    setInterval(() => Ticker.actualizar(), CONFIG.INTERVALO_TICKER);
                },
            };

            window.TodoDeportes = {
                reintentar(deporteId) {
                    const loader = document.getElementById('loader-' + deporteId);
                    if (loader) loader.style.display = 'flex';
                    document.getElementById('partidos-' + deporteId).innerHTML = '';
                    App.cargarDeporte(deporteId, true);
                },
                recargarTodo() {
                    App.refrescarTodo();
                },
            };

            document.addEventListener('DOMContentLoaded', () => App.iniciar());
        })();
    </script>
</body>
</html>
