                        league: 'wta', pais: 'Mundial', tieneStandings: false },
                    { id: 'racing-f1', nombre: 'F1', icon: 'fa-flag-checkered', sport: 'racing',
                        league: 'f1', pais: 'Mundial', tieneStandings: false },
                    { id: 'mma-ufc', nombre: 'UFC', icon: 'fa-hand-fist', sport: 'mma', league: 'ufc',
                        pais: 'Mundial', tieneStandings: false },
                    { id: 'boxing', nombre: 'Boxeo', icon: 'fa-boxing-glove', sport: 'boxing',
                        league: 'top-rank', pais: 'Mundial', tieneStandings: false },
                ],
            };

            const STATE = {
                deporteActivo: CONFIG.DEPORTES[0].id,
                filtroActivo: 'todos',
                subTabActivo: 'partidos',
                cache: {},
                cacheStandings: {},
                cacheNews: {},
                cacheStats: {},
                tickerData: [],
                marcadoresAnteriores: {},
                favoritos: {},
            };

            const DOM = {
                nav: document.getElementById('sportNav'),
                main: document.getElementById('mainContent'),
                tickerTrack: document.getElementById('tickerTrack'),
                tickerWrap: document.getElementById('tickerWrap'),
                tickerLabel: document.getElementById('tickerLabel'),
                liveTime: document.getElementById('liveTime'),
            };

            const Util = {
                escaparHTML(str) {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                },
                formatearHora() {
                    return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                },
                obtenerDeporte(id) {
                    return CONFIG.DEPORTES.find(d => d.id === id);
                },
                formatearFecha(isoStr) {
                    if (!isoStr) return '';
                    const d = new Date(isoStr);
                    return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }) +
                        ' · ' + d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                },
                truncar(str, max) {
                    if (!str) return '';
                    return str.length > max ? str.slice(0, max) + '…' : str;
                },
            };

            // ──────────────────────── FAVORITOS ────────────────────────
            const FavManager = {
                cargar() {
                    try {
                        const raw = localStorage.getItem('td_favoritos');
                        STATE.favoritos = raw ? JSON.parse(raw) : {};
                    } catch (e) {
                        STATE.favoritos = {};
                    }
                },
                guardar() {
                    try {
                        localStorage.setItem('td_favoritos', JSON.stringify(STATE.favoritos));
                    } catch (e) { /* quota excedida, ignorar */ }
                },
                toggle(deporteId, equipoNombre) {
                    const key = `${deporteId}|||${equipoNombre}`;
                    if (STATE.favoritos[key]) {
                        delete STATE.favoritos[key];
                    } else {
                        STATE.favoritos[key] = true;
                    }
                    this.guardar();
                    return !!STATE.favoritos[key];
                },
                esFavorito(deporteId, equipoNombre) {
                    const key = `${deporteId}|||${equipoNombre}`;
                    return !!STATE.favoritos[key];
                },
                obtenerEquiposFavoritos() {
                    const equipos = [];
                    for (const [key, val] of Object.entries(STATE.favoritos)) {
                        if (val) {
                            const [deporteId, nombre] = key.split('|||');
                            equipos.push({ deporteId, nombre });
                        }
                    }
                    return equipos;
                },
            };

            // ──────────────────────── API ────────────────────────
            const API = {
                async obtenerDatos(deporte) {
                    const url = `${CONFIG.API_BASE}/${deporte.sport}/${deporte.league}/scoreboard?lang=es&limit=60`;
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(`Error HTTP ${resp.status}`);
                    return await resp.json();
                },
                async obtenerStandings(deporte) {
                    const url = `${CONFIG.API_BASE}/${deporte.sport}/${deporte.league}/standings?lang=es`;
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(`Error HTTP ${resp.status}`);
                    return await resp.json();
                },
                async obtenerNoticias(deporte) {
                    const url = `${CONFIG.API_BASE}/${deporte.sport}/${deporte.league}/news?lang=es&limit=30`;
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(`Error HTTP ${resp.status}`);
                    return await resp.json();
                },
                async obtenerResumenEvento(deporte, eventId) {
                    const url = `${CONFIG.API_BASE}/${deporte.sport}/${deporte.league}/summary?event=${eventId}&lang=es`;
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(`Error HTTP ${resp.status}`);
                    return await resp.json();
                },
                procesarEventos(data) {
                    if (!data.events || !data.events.length) return [];
                    return data.events.map(ev => {
                        const comp = ev.competitions?.[0];
                        if (!comp || !comp.competitors || comp.competitors.length < 2) return null;
                        const local = comp.competitors[0];
                        const visitante = comp.competitors[1];
                        const status = ev.status || {};
                        const state = status.type?.state || 'pre';
                        const detail = status.type?.detail || 'Programado';
                        const shortDetail = status.type?.shortDetail || '';
                        const clock = status.displayClock || '';
                        const period = status.period || '';
                        let claseEstado = 'scheduled';
                        let textoEstado = detail;
                        if (state === 'in') {
                            claseEstado = 'live';
                            textoEstado = clock || shortDetail || 'En vivo';
                        } else if (state === 'post') {
                            claseEstado = 'finished';
                            textoEstado = 'Finalizado';
                        }
                        // Obtener logos
                        const localLogo = local.team?.logos?.[0]?.href || local.team?.logo || '';
                        const visitanteLogo = visitante.team?.logos?.[0]?.href || visitante.team?.logo || '';
                        return {
                            id: ev.id,
                            local: local.team?.displayName || local.team?.shortDisplayName || 'Local',
                            visitante: visitante.team?.displayName || visitante.team?.shortDisplayName || 'Visitante',
                            localLogo,
                            visitanteLogo,
                            scoreLocal: local.score ?? '-',
                            scoreVisitante: visitante.score ?? '-',
                            claseEstado,
                            textoEstado,
                            state,
                            detail,
                            shortDetail,
                            clock,
                            period,
                            localRecord: local.records?.[0]?.summary || '',
                            visitanteRecord: visitante.records?.[0]?.summary || '',
                            transmision: comp.broadcasts?.[0]?.names?.[0] || '',
                            sede: comp.venue?.fullName || '',
                            fechaISO: ev.date || '',
                        };
                    }).filter(Boolean);
                },
                procesarStandings(data) { /* igual que antes, ya incluía logos */ 
                    const grupos = [];
                    if (data.children) {
                        for (const child of data.children) {
                            const nombreGrupo = child.name || child.abbreviation || '';
                            const standings = child.standings?.entries || [];
                            const equipos = standings.map((entry, idx) => {
                                const stats = entry.stats || [];
                                const statsMap = {};
                                stats.forEach(s => { statsMap[s.name || s.abbreviation] = s.displayValue || s.value; });
                                return {
                                    pos: idx + 1,
                                    equipo: entry.team?.displayName || entry.team?.shortDisplayName || 'Desconocido',
                                    logo: entry.team?.logos?.[0]?.href || '',
                                    stats: statsMap,
                                    nota: entry.note?.description || '',
                                };
                            });
                            grupos.push({ nombre: nombreGrupo, equipos });
                        }
                    } else if (data.standings?.entries) {
                        const standings = data.standings.entries;
                        const equipos = standings.map((entry, idx) => {
                            const stats = entry.stats || [];
                            const statsMap = {};
                            stats.forEach(s => { statsMap[s.name || s.abbreviation] = s.displayValue || s.value; });
                            return {
                                pos: idx + 1,
                                equipo: entry.team?.displayName || entry.team?.shortDisplayName || 'Desconocido',
                                logo: entry.team?.logos?.[0]?.href || '',
                                stats: statsMap,
                                nota: entry.note?.description || '',
                            };
                        });
                        grupos.push({ nombre: data.name || data.abbreviation || 'Clasificación', equipos });
                    }
                    return grupos;
                },
                procesarNoticias(data) { /* sin cambios */ 
                    if (!data.articles || !data.articles.length) return [];
                    return data.articles.map(art => ({
                        titulo: art.headline || 'Sin título',
                        descripcion: art.description || '',
                        url: art.links?.web?.href || '#',
                        imagen: art.images?.[0]?.url || '',
                        fuente: art.source || 'ESPN',
                        fecha: art.published || '',
                        categoria: art.categories?.[0]?.description || '',
                    }));
                },
            };

            // ──────────────────────── CACHE MANAGER (sin cambios) ────────────────────────
            const CacheManager = {
                guardar(deporteId, partidos) {
                    const anteriores = STATE.marcadoresAnteriores[deporteId] || {};
                    const nuevos = {};
                    partidos.forEach(p => { nuevos[p.id] = `${p.scoreLocal}-${p.scoreVisitante}`; });
                    const cambiados = new Set();
                    for (const [id, marcador] of Object.entries(nuevos)) {
                        if (anteriores[id] && anteriores[id] !== marcador) cambiados.add(id);
                    }
                    STATE.marcadoresAnteriores[deporteId] = nuevos;
                    STATE.cache[deporteId] = { partidos, timestamp: Date.now(), cambiados };
                },
                obtener(deporteId) { return STATE.cache[deporteId] || null; },
                esValido(deporteId) {
                    const c = STATE.cache[deporteId];
                    return c && (Date.now() - c.timestamp < CONFIG.VIDA_CACHE);
                },
                guardarStandings(deporteId, grupos) { STATE.cacheStandings[deporteId] = { grupos, timestamp: Date.now() }; },
                obtenerStandings(deporteId) { return STATE.cacheStandings[deporteId] || null; },
                esValidoStandings(deporteId) {
                    const c = STATE.cacheStandings[deporteId];
                    return c && (Date.now() - c.timestamp < CONFIG.VIDA_CACHE_STANDINGS);
                },
                guardarNoticias(deporteId, noticias) { STATE.cacheNews[deporteId] = { noticias, timestamp: Date.now() }; },
                obtenerNoticias(deporteId) { return STATE.cacheNews[deporteId] || null; },
                esValidoNoticias(deporteId) {
                    const c = STATE.cacheNews[deporteId];
                    return c && (Date.now() - c.timestamp < CONFIG.VIDA_CACHE_NEWS);
                },
                guardarStatsEvento(eventId, statsData) { STATE.cacheStats[eventId] = { data: statsData, timestamp: Date.now() }; },
                obtenerStatsEvento(eventId) { return STATE.cacheStats[eventId] || null; },
            };

            // ──────────────────────── UI BUILDER (modificado para logos y estrellas laterales) ────────────────────────
            const UIBuilder = {
                construirNavegacion() { /* igual */ 
                    const tabs = CONFIG.DEPORTES.map(d => `
                        <button class="sport-tab${d.id === STATE.deporteActivo ? ' active' : ''}"
                                data-id="${d.id}" title="${d.nombre} · ${d.pais}">
                            <i class="fa-solid ${d.icon}"></i>
                            <span>${d.nombre}</span>
                        </button>
                    `).join('');
                    const favBtn = `
                        <button class="sport-tab fav-tab" data-id="__favoritos__" title="Mis equipos favoritos">
                            <i class="fa-solid fa-star"></i>
                            <span>Favoritos</span>
                        </button>`;
                    DOM.nav.innerHTML = tabs + favBtn;
                    DOM.nav.querySelectorAll('.sport-tab').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            STATE.deporteActivo = id;
                            STATE.filtroActivo = 'todos';
                            STATE.subTabActivo = 'partidos';
                            this.actualizarTabActivo();
                            if (id === '__favoritos__') {
                                this.mostrarPanelFavoritos();
                            } else {
                                this.mostrarPanel(id);
                                App.cargarDeporte(id);
                            }
                        });
                    });
                },
                actualizarTabActivo() {
                    DOM.nav.querySelectorAll('.sport-tab').forEach(b =>
                        b.classList.toggle('active', b.dataset.id === STATE.deporteActivo)
                    );
                    const activo = DOM.nav.querySelector(`[data-id="${STATE.deporteActivo}"]`);
                    if (activo) activo.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                },
                construirPaneles() { /* igual pero con la estructura de subpaneles, sin cambios relevantes */ 
                    DOM.main.innerHTML = CONFIG.DEPORTES.map(d => `
                        <div class="panel${d.id === STATE.deporteActivo ? ' active' : ''}" id="panel-${d.id}">
                            <div class="panel-header">
                                <div class="section-title">
                                    <i class="fa-solid ${d.icon}"></i>
                                    <span>${d.nombre}</span>
                                </div>
                            </div>
                            <div class="sub-nav" id="subnav-${d.id}">
                                <button class="sub-tab active" data-subtab="partidos" data-deporte="${d.id}"><i class="fa-solid fa-futbol"></i> Partidos</button>
                                ${d.tieneStandings ? `<button class="sub-tab" data-subtab="standings" data-deporte="${d.id}"><i class="fa-solid fa-table-list"></i> Tabla</button>` : ''}
                                <button class="sub-tab" data-subtab="noticias" data-deporte="${d.id}"><i class="fa-solid fa-newspaper"></i> Noticias</button>
                            </div>
                            <div class="sub-content active" id="sub-partidos-${d.id}">
                                <div class="filter-group" data-panel="${d.id}">
                                    <button class="filter-btn active" data-filtro="todos">Todos</button>
                                    <button class="filter-btn" data-filtro="en-vivo">En vivo</button>
                                    <button class="filter-btn" data-filtro="finalizados">Finalizados</button>
                                </div>
                                <div class="summary-bar" id="summary-${d.id}"></div>
                                <div class="loader" id="loader-${d.id}"><div class="spinner"></div></div>
                                <div id="partidos-${d.id}"></div>
                            </div>
                            ${d.tieneStandings ? `<div class="sub-content" id="sub-standings-${d.id}"><div class="loader" id="loader-standings-${d.id}"><div class="spinner"></div></div><div id="standings-${d.id}"></div></div>` : `<div class="sub-content" id="sub-standings-${d.id}"><div class="empty"><i class="fa-solid fa-table-list"></i><p>Sin tabla</p></div></div>`}
                            <div class="sub-content" id="sub-noticias-${d.id}"><div class="loader" id="loader-news-${d.id}"><div class="spinner"></div></div><div id="noticias-${d.id}"></div></div>
                        </div>
                    `).join('');
                    // Panel favoritos
                    const favPanel = document.createElement('div');
                    favPanel.className = 'panel';
                    favPanel.id = 'panel-__favoritos__';
                    favPanel.innerHTML = `
                        <div class="panel-header"><div class="section-title"><i class="fa-solid fa-star" style="color:var(--gold);"></i><span>Mis Equipos Favoritos</span></div></div>
                        <div class="sub-nav"><button class="sub-tab active" data-subtab="fav-partidos" data-deporte="__favoritos__"><i class="fa-solid fa-futbol"></i> Partidos</button></div>
                        <div class="sub-content active" id="sub-fav-partidos-__favoritos__"><div class="summary-bar" id="summary-__favoritos__"></div><div class="loader" id="loader-__favoritos__" style="display:none;"><div class="spinner"></div></div><div id="partidos-__favoritos__"></div></div>
                    `;
                    DOM.main.appendChild(favPanel);
                    // Event listeners sub-tabs
                    DOM.main.querySelectorAll('.sub-tab').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const subtab = btn.dataset.subtab;
                            const deporteId = btn.dataset.deporte;
                            STATE.subTabActivo = subtab;
                            this.actualizarSubTabs(deporteId, subtab);
                            if (subtab === 'standings') App.cargarStandings(deporteId);
                            else if (subtab === 'noticias') App.cargarNoticias(deporteId);
                            else if (subtab === 'partidos' && deporteId !== '__favoritos__') App.cargarDeporte(deporteId);
                            else if (subtab === 'fav-partidos') App.renderizarFavoritos();
                        });
                    });
                    // filtros
                    DOM.main.querySelectorAll('.filter-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const panelId = e.target.closest('.filter-group').dataset.panel;
                            const filtro = btn.dataset.filtro;
                            STATE.filtroActivo = filtro;
                            const group = e.target.closest('.filter-group');
                            group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            const cacheEntry = STATE.cache[panelId];
                            if (cacheEntry) this.renderizarPartidos(panelId, cacheEntry.partidos, cacheEntry.cambiados || new Set());
                        });
                    });
                    // click en cards
                    DOM.main.addEventListener('click', (e) => {
                        const card = e.target.closest('.match-card');
                        if (card && !e.target.closest('.fav-star-btn')) {
                            card.classList.toggle('expanded');
                            const eventId = card.dataset.matchId;
                            const deporteId = card.dataset.deporteId;
                            if (card.classList.contains('expanded') && eventId && deporteId && deporteId !== '__favoritos__') {
                                App.cargarStatsEvento(deporteId, eventId, card);
                            }
                        }
                        const starBtn = e.target.closest('.fav-star-btn');
                        if (starBtn) {
                            e.stopPropagation();
                            const deporteId = starBtn.dataset.deporte;
                            const equipo = starBtn.dataset.equipo;
                            const esFav = FavManager.toggle(deporteId, equipo);
                            starBtn.classList.toggle('is-fav', esFav);
                            const cardEl = starBtn.closest('.match-card');
                            if (cardEl) {
                                const otrasEstrellas = cardEl.querySelectorAll(`.fav-star-btn[data-equipo="${equipo}"]`);
                                otrasEstrellas.forEach(s => s.classList.toggle('is-fav', esFav));
                            }
                        }
                    });
                },
                actualizarSubTabs(deporteId, subtab) {
                    const panel = document.getElementById('panel-' + deporteId) || document.getElementById('panel-__favoritos__');
                    if (!panel) return;
                    panel.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
                    const activeBtn = panel.querySelector(`[data-subtab="${subtab}"]`);
                    if (activeBtn) activeBtn.classList.add('active');
                    panel.querySelectorAll('.sub-content').forEach(sc => sc.classList.remove('active'));
                    const contentId = subtab === 'fav-partidos' ? 'sub-fav-partidos-__favoritos__' : `sub-${subtab}-${deporteId}`;
                    const content = document.getElementById(contentId);
                    if (content) content.classList.add('active');
                },
                mostrarPanel(id) {
                    DOM.main.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                    const panel = document.getElementById('panel-' + id);
                    if (panel) {
                        panel.classList.add('active');
                        const group = panel.querySelector('.filter-group');
                        if (group) {
                            group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                            const todosBtn = group.querySelector('[data-filtro="todos"]');
                            if (todosBtn) todosBtn.classList.add('active');
                        }
                    }
                    STATE.filtroActivo = 'todos';
                    STATE.subTabActivo = 'partidos';
                    this.actualizarSubTabs(id, 'partidos');
                },
                mostrarPanelFavoritos() {
                    DOM.main.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                    const panel = document.getElementById('panel-__favoritos__');
                    if (panel) panel.classList.add('active');
                    STATE.filtroActivo = 'todos';
                    STATE.subTabActivo = 'fav-partidos';
                    this.actualizarSubTabs('__favoritos__', 'fav-partidos');
                    App.renderizarFavoritos();
                },
                renderizarPartidos(deporteId, partidos, cambiados = new Set()) {
                    const contenedor = document.getElementById('partidos-' + deporteId);
                    const loader = document.getElementById('loader-' + deporteId);
                    const summaryBar = document.getElementById('summary-' + deporteId);
                    if (loader) loader.style.display = 'none';
                    let filtrados = partidos;
                    if (STATE.filtroActivo === 'en-vivo') filtrados = partidos.filter(p => p.claseEstado === 'live');
                    else if (STATE.filtroActivo === 'finalizados') filtrados = partidos.filter(p => p.claseEstado === 'finished');
                    const enVivo = partidos.filter(p => p.claseEstado === 'live').length;
                    const finalizados = partidos.filter(p => p.claseEstado === 'finished').length;
                    const programados = partidos.filter(p => p.claseEstado === 'scheduled').length;
                    if (summaryBar) {
                        summaryBar.innerHTML = `<span class="summary-item"><span class="summary-dot live-dot"></span> ${enVivo} en vivo</span>
                            <span class="summary-item"><span class="summary-dot fin-dot"></span> ${finalizados} finalizados</span>
                            <span class="summary-item"><span class="summary-dot sched-dot"></span> ${programados} programados</span>`;
                    }
                    if (!filtrados.length) {
                        const mensaje = STATE.filtroActivo === 'en-vivo' ? 'No hay partidos en vivo ahora' : STATE.filtroActivo === 'finalizados' ? 'No hay finalizados' : 'No hay partidos';
                        contenedor.innerHTML = `<div class="empty"><i class="fa-regular fa-calendar-xmark"></i><p>${mensaje}</p></div>`;
                        return;
                    }
                    contenedor.innerHTML = filtrados.map(p => {
                        const flashClass = cambiados.has(p.id) ? ' flash-update' : '';
                        const esFavLocal = FavManager.esFavorito(deporteId, p.local);
                        const esFavVisitante = FavManager.esFavorito(deporteId, p.visitante);
                        const localLogoHtml = p.localLogo ? `<img class="team-logo" src="${p.localLogo}" alt="" loading="lazy" onerror="this.style.display='none'">` : '';
                        const visitanteLogoHtml = p.visitanteLogo ? `<img class="team-logo" src="${p.visitanteLogo}" alt="" loading="lazy" onerror="this.style.display='none'">` : '';
                        const extraInfo = [];
                        if (p.period) extraInfo.push(`<span class="detail-chip"><i class="fa-regular fa-clock"></i> ${p.period}º tiempo</span>`);
                        if (p.clock && p.claseEstado === 'live') extraInfo.push(`<span class="detail-chip"><i class="fa-solid fa-stopwatch"></i> ${p.clock}</span>`);
                        if (p.localRecord) extraInfo.push(`<span class="detail-chip"><i class="fa-solid fa-chart-bar"></i> ${p.localRecord}</span>`);
                        if (p.visitanteRecord) extraInfo.push(`<span class="detail-chip"><i class="fa-solid fa-chart-bar"></i> ${p.visitanteRecord}</span>`);
                        if (p.transmision) extraInfo.push(`<span class="detail-chip"><i class="fa-solid fa-tv"></i> ${p.transmision}</span>`);
                        if (p.sede) extraInfo.push(`<span class="detail-chip"><i class="fa-solid fa-location-dot"></i> ${p.sede}</span>`);
                        extraInfo.push(`<span class="detail-chip" id="stats-chip-${p.id}"><i class="fa-solid fa-chart-pie"></i> Cargando estadísticas...</span>`);
                        return `
                            <div class="match-card${flashClass}" data-match-id="${p.id}" data-deporte-id="${deporteId}">
                                <div class="match-main">
                                    <div class="team-block home">
                                        <button class="fav-star-btn${esFavLocal ? ' is-fav' : ''}" data-deporte="${deporteId}" data-equipo="${Util.escaparHTML(p.local)}" title="Favorito: ${Util.escaparHTML(p.local)}"><i class="fa-solid fa-star"></i></button>
                                        ${localLogoHtml}
                                        <span class="team-name">${Util.escaparHTML(p.local)}</span>
                                    </div>
                                    <div class="score-box${p.claseEstado === 'live' ? ' live-score' : ''}">${p.scoreLocal} - ${p.scoreVisitante}</div>
                                    <div class="team-block away">
                                        <span class="team-name">${Util.escaparHTML(p.visitante)}</span>
                                        ${visitanteLogoHtml}
                                        <button class="fav-star-btn${esFavVisitante ? ' is-fav' : ''}" data-deporte="${deporteId}" data-equipo="${Util.escaparHTML(p.visitante)}" title="Favorito: ${Util.escaparHTML(p.visitante)}"><i class="fa-solid fa-star"></i></button>
                                    </div>
                                    <span class="state-badge ${p.claseEstado}">${p.textoEstado}</span>
                                </div>
                                <div class="match-detail">
                                    ${extraInfo.length ? extraInfo.join('') : '<span class="detail-chip"><i class="fa-solid fa-info-circle"></i> Sin detalles</span>'}
                                </div>
                            </div>
                        `;
                    }).join('');
                },
                renderizarStandings(deporteId, grupos) { /* sin cambios */ 
                    const contenedor = document.getElementById('standings-' + deporteId);
                    const loader = document.getElementById('loader-standings-' + deporteId);
                    if (loader) loader.style.display = 'none';
                    if (!grupos || !grupos.length || !grupos[0].equipos.length) {
                        contenedor.innerHTML = '<div class="empty"><i class="fa-solid fa-table-list"></i><p>No hay datos de clasificación disponibles.</p></div>';
                        return;
                    }
                    let html = '';
                    grupos.forEach(grupo => {
                        if (grupo.nombre) html += `<h3 style="margin:14px 0 8px;font-size:0.9rem;color:var(--text2);">${grupo.nombre}</h3>`;
                        const claves = grupo.equipos.length > 0 ? Object.keys(grupo.equipos[0].stats) : [];
                        const clavesMostrar = claves.filter(k => /^(GP|PJ|W|G|V|E|D|L|P|PTS|pts|GF|GC|DG|GD|DIFF|pct|PCT|W-L|record|points|gamesPlayed|wins|losses|ties|draws|goalsFor|goalsAgainst|goalDifference|pointsFor|pointsAgainst)$/i.test(k));
                        if (clavesMostrar.length === 0 && claves.length > 0) clavesMostrar.push(...claves.slice(0, 6));
                        html += `<div style="overflow-x:auto;"><table class="standings-table"><thead><tr><th>#</th><th>Equipo</th>${clavesMostrar.map(k => `<th>${k}</th>`).join('')}</tr></thead><tbody>`;
                        grupo.equipos.forEach(eq => {
                            const posClass = eq.pos <= 4 ? 'zona-ucl' : eq.pos >= grupo.equipos.length - 2 ? 'zona-descenso' : '';
                            html += `<tr><td class="pos ${posClass}">${eq.pos}</td><td><span class="team-cell">${eq.logo ? `<img src="${eq.logo}" alt="" onerror="this.style.display='none'">` : ''}${Util.escaparHTML(eq.equipo)}</span></td>${clavesMostrar.map(k => `<td class="pts">${eq.stats[k] || '-'}</td>`).join('')}</tr>`;
                        });
                        html += '</tbody></table></div>';
                    });
                    contenedor.innerHTML = html;
                },
                renderizarNoticias(deporteId, noticias) { /* sin cambios */ 
                    const contenedor = document.getElementById('noticias-' + deporteId);
                    const loader = document.getElementById('loader-news-' + deporteId);
                    if (loader) loader.style.display = 'none';
                    if (!noticias.length) {
                        contenedor.innerHTML = '<div class="empty"><i class="fa-solid fa-newspaper"></i><p>No hay noticias disponibles.</p></div>';
                        return;
                    }
                    contenedor.innerHTML = noticias.map(n => {
                        const imagenHtml = n.imagen ? `<img src="${n.imagen}" alt="" loading="lazy" onerror="this.onerror=null; this.parentElement.innerHTML = '<div class=\'news-img-placeholder\'><i class=\'fa-solid fa-image\'></i></div>'">` : `<div class="news-img-placeholder"><i class="fa-solid fa-newspaper"></i></div>`;
                        return `<a href="${n.url}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;"><div class="news-card">${imagenHtml}<div class="news-content"><div class="news-title">${Util.escaparHTML(n.titulo)}</div><div class="news-meta"><span><i class="fa-solid fa-clock"></i> ${Util.formatearFecha(n.fecha)}</span><span><i class="fa-solid fa-tag"></i> ${Util.escaparHTML(n.fuente)}</span>${n.categoria ? `<span>· ${Util.escaparHTML(n.categoria)}</span>` : ''}</div>${n.descripcion ? `<div class="news-desc">${Util.escaparHTML(Util.truncar(n.descripcion, 180))}</div>` : ''}</div></div></a>`;
                    }).join('');
                },
                renderizarStatsEnChip(eventId, statsData, cardElement) { /* sin cambios */ 
                    const chip = cardElement?.querySelector(`#stats-chip-${eventId}`);
                    if (!chip || !statsData) { if (chip) chip.innerHTML = '<i class="fa-solid fa-chart-pie"></i> Sin estadísticas'; return; }
                    try {
                        const header = statsData.header?.competitions?.[0];
                        if (!header) { chip.innerHTML = '<i class="fa-solid fa-chart-pie"></i> Sin estadísticas'; return; }
                        const statsGroups = header.stats || [];
                        const flatStats = [];
                        statsGroups.forEach(group => { if (group.stats) flatStats.push(...group.stats); });
                        if (flatStats.length === 0) { chip.innerHTML = '<i class="fa-solid fa-chart-pie"></i> Sin estadísticas'; return; }
                        const statsContainer = document.createElement('div');
                        statsContainer.className = 'stats-mini';
                        statsContainer.style.width = '100%';
                        flatStats.slice(0, 8).forEach(stat => {
                            const valA = parseFloat(stat.athletes?.[0]?.stats?.[0]?.value) || 0;
                            const valB = parseFloat(stat.athletes?.[1]?.stats?.[0]?.value) || 0;
                            const total = valA + valB || 1;
                            const pctA = Math.round((valA / total) * 100);
                            statsContainer.innerHTML += `<div class="stat-row"><span class="stat-val">${valA}</span><span class="stat-label">${stat.name || stat.abbreviation || 'Stat'}</span><div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${pctA}%;"></div></div><span class="stat-val">${valB}</span></div>`;
                        });
                        chip.innerHTML = '';
                        chip.appendChild(statsContainer);
                        chip.style.flexBasis = '100%';
                        chip.style.width = '100%';
                    } catch (e) { chip.innerHTML = '<i class="fa-solid fa-chart-pie"></i> Estadísticas no disponibles'; }
                },
                mostrarErrorStandings(deporteId, mensaje) { /* igual */ 
                    const contenedor = document.getElementById('standings-' + deporteId);
                    const loader = document.getElementById('loader-standings-' + deporteId);
                    if (loader) loader.style.display = 'none';
                    contenedor.innerHTML = `<div class="empty"><i class="fa-solid fa-cloud-bolt"></i><p>${mensaje}</p><button class="retry-btn" onclick="TodoDeportes.reintentarStandings('${deporteId}')"><i class="fa-solid fa-rotate-right"></i> Reintentar</button></div>`;
                },
                mostrarErrorNoticias(deporteId, mensaje) {
                    const contenedor = document.getElementById('noticias-' + deporteId);
                    const loader = document.getElementById('loader-news-' + deporteId);
                    if (loader) loader.style.display = 'none';
                    contenedor.innerHTML = `<div class="empty"><i class="fa-solid fa-cloud-bolt"></i><p>${mensaje}</p><button class="retry-btn" onclick="TodoDeportes.reintentarNoticias('${deporteId}')"><i class="fa-solid fa-rotate-right"></i> Reintentar</button></div>`;
                },
                mostrarError(deporteId, mensaje = 'Error al cargar los datos.') {
                    const contenedor = document.getElementById('partidos-' + deporteId);
                    const loader = document.getElementById('loader-' + deporteId);
                    if (loader) loader.style.display = 'none';
                    if (contenedor) contenedor.innerHTML = `<div class="empty"><i class="fa-solid fa-cloud-bolt"></i><p>${mensaje}</p><button class="retry-btn" onclick="TodoDeportes.reintentar('${deporteId}')"><i class="fa-solid fa-rotate-right"></i> Reintentar</button></div>`;
                },
            };

            // Ticker más rápido (ya ajustado en CSS)
            const Ticker = {
                actualizar() {
                    const enVivo = [];
                    for (const [deporteId, entry] of Object.entries(STATE.cache)) {
                        const deporte = Util.obtenerDeporte(deporteId);
                        if (!deporte || !entry || !entry.partidos) continue;
                        entry.partidos.filter(p => p.claseEstado === 'live').forEach(p => {
                            enVivo.push({ ...p, deporteNombre: deporte.nombre, deporteIcon: deporte.icon });
                        });
                    }
                    if (enVivo.length === 0) {
                        const finalizados = [];
                        for (const [deporteId, entry] of Object.entries(STATE.cache)) {
                            const deporte = Util.obtenerDeporte(deporteId);
                            if (!deporte || !entry || !entry.partidos) continue;
                            entry.partidos.filter(p => p.claseEstado === 'finished').forEach(p => {
                                finalizados.push({ ...p, deporteNombre: deporte.nombre, deporteIcon: deporte.icon });
                            });
                        }
                        if (finalizados.length > 0) {
                            DOM.tickerLabel.innerHTML = '<i class="fa-solid fa-clock-rotate-left"></i> RESULTADOS';
                            const items = finalizados.slice(0, 20).map(p => `<span class="ticker-item"><i class="fa-solid ${p.deporteIcon}"></i><span>${p.deporteNombre}</span><span class="dot-sep"></span><span>${Util.escaparHTML(p.local)}</span><span class="score-mini">${p.scoreLocal}-${p.scoreVisitante}</span><span>${Util.escaparHTML(p.visitante)}</span><span class="dot-sep"></span><span>Finalizado</span></span>`).join('');
                            DOM.tickerTrack.innerHTML = items + items;
                            return;
                        }
                        DOM.tickerLabel.innerHTML = '<i class="fa-solid fa-bolt"></i> EN VIVO';
                        DOM.tickerTrack.innerHTML = '<span class="ticker-item"><span class="dot-sep"></span> No hay partidos en vivo ahora<span class="dot-sep"></span></span>';
                        return;
                    }
                    DOM.tickerLabel.innerHTML = '<i class="fa-solid fa-bolt"></i> EN VIVO';
                    const items = enVivo.map(p => `<span class="ticker-item"><i class="fa-solid ${p.deporteIcon}"></i><span>${p.deporteNombre}</span><span class="dot-sep"></span><span>${Util.escaparHTML(p.local)}</span><span class="score-mini">${p.scoreLocal}-${p.scoreVisitante}</span><span>${Util.escaparHTML(p.visitante)}</span><span class="dot-sep"></span><span>${p.textoEstado}</span></span>`).join('');
                    DOM.tickerTrack.innerHTML = items + items;
                },
            };

            const App = {
                async cargarDeporte(deporteId, forzar = false) {
                    if (deporteId === '__favoritos__') { this.renderizarFavoritos(); return; }
                    const deporte = Util.obtenerDeporte(deporteId);
                    if (!deporte) return;
                    const cacheEntry = CacheManager.obtener(deporteId);
                    const loader = document.getElementById('loader-' + deporteId);
                    if (!forzar && CacheManager.esValido(deporteId)) {
                        UIBuilder.renderizarPartidos(deporteId, cacheEntry.partidos, cacheEntry.cambiados || new Set());
                        if (loader) loader.style.display = 'none';
                        return;
                    }
                    if (!cacheEntry || forzar) { if (loader) loader.style.display = 'flex'; const contenedor = document.getElementById('partidos-' + deporteId); if (contenedor && forzar) contenedor.innerHTML = ''; }
                    try {
                        const data = await API.obtenerDatos(deporte);
                        const partidos = API.procesarEventos(data);
                        CacheManager.guardar(deporteId, partidos);
                        const entry = CacheManager.obtener(deporteId);
                        UIBuilder.renderizarPartidos(deporteId, partidos, entry?.cambiados || new Set());
                        Ticker.actualizar();
                    } catch (err) {
                        console.warn(`Error en ${deporte.nombre}:`, err.message);
                        if (cacheEntry && cacheEntry.partidos.length) UIBuilder.renderizarPartidos(deporteId, cacheEntry.partidos);
                        else UIBuilder.mostrarError(deporteId, 'No se pudieron cargar los datos. Verifica tu conexión.');
                    }
                },
                async cargarStandings(deporteId) { /* igual */ 
                    if (deporteId === '__favoritos__') return;
                    const deporte = Util.obtenerDeporte(deporteId);
                    if (!deporte || !deporte.tieneStandings) return;
                    const cacheEntry = CacheManager.obtenerStandings(deporteId);
                    const loader = document.getElementById('loader-standings-' + deporteId);
                    if (CacheManager.esValidoStandings(deporteId)) { UIBuilder.renderizarStandings(deporteId, cacheEntry.grupos); if (loader) loader.style.display = 'none'; return; }
                    if (loader) loader.style.display = 'flex';
                    try { const data = await API.obtenerStandings(deporte); const grupos = API.procesarStandings(data); CacheManager.guardarStandings(deporteId, grupos); UIBuilder.renderizarStandings(deporteId, grupos); } 
                    catch (err) { if (cacheEntry && cacheEntry.grupos) UIBuilder.renderizarStandings(deporteId, cacheEntry.grupos); else UIBuilder.mostrarErrorStandings(deporteId, 'No se pudo cargar la tabla.'); }
                },
                async cargarNoticias(deporteId) { /* igual */ 
                    if (deporteId === '__favoritos__') return;
                    const deporte = Util.obtenerDeporte(deporteId);
                    if (!deporte) return;
                    const cacheEntry = CacheManager.obtenerNoticias(deporteId);
                    const loader = document.getElementById('loader-news-' + deporteId);
                    if (CacheManager.esValidoNoticias(deporteId)) { UIBuilder.renderizarNoticias(deporteId, cacheEntry.noticias); if (loader) loader.style.display = 'none'; return; }
                    if (loader) loader.style.display = 'flex';
                    try { const data = await API.obtenerNoticias(deporte); const noticias = API.procesarNoticias(data); CacheManager.guardarNoticias(deporteId, noticias); UIBuilder.renderizarNoticias(deporteId, noticias); } 
                    catch (err) { if (cacheEntry && cacheEntry.noticias) UIBuilder.renderizarNoticias(deporteId, cacheEntry.noticias); else UIBuilder.mostrarErrorNoticias(deporteId, 'No se pudieron cargar las noticias.'); }
                },
                async cargarStatsEvento(deporteId, eventId, cardElement) { /* igual */ 
                    const chip = cardElement?.querySelector(`#stats-chip-${eventId}`);
                    if (!chip || chip.querySelector('.stats-mini')) return;
                    const cacheEntry = CacheManager.obtenerStatsEvento(eventId);
                    if (cacheEntry) { UIBuilder.renderizarStatsEnChip(eventId, cacheEntry.data, cardElement); return; }
                    const deporte = Util.obtenerDeporte(deporteId);
                    if (!deporte) { if (chip) chip.innerHTML = '<i class="fa-solid fa-chart-pie"></i> Estadísticas no disponibles'; return; }
                    try { const data = await API.obtenerResumenEvento(deporte, eventId); CacheManager.guardarStatsEvento(eventId, data); UIBuilder.renderizarStatsEnChip(eventId, data, cardElement); } 
                    catch (err) { if (chip) chip.innerHTML = '<i class="fa-solid fa-chart-pie"></i> Estadísticas no disponibles'; }
                },
                renderizarFavoritos() { /* similar a renderizarPartidos pero agregando logos y estrellas laterales */ 
                    const contenedor = document.getElementById('partidos-__favoritos__');
                    const summaryBar = document.getElementById('summary-__favoritos__');
                    const favEquipos = FavManager.obtenerEquiposFavoritos();
                    if (!favEquipos.length) {
                        if (summaryBar) summaryBar.innerHTML = '';
                        contenedor.innerHTML = `<div class="empty"><i class="fa-regular fa-star"></i><p>No tienes equipos favoritos.</p><p style="font-size:0.8rem;">Toca la estrella junto a un equipo para agregarlo.</p></div>`;
                        return;
                    }
                    const todosPartidos = [];
                    for (const fav of favEquipos) {
                        const cacheEntry = STATE.cache[fav.deporteId];
                        if (!cacheEntry || !cacheEntry.partidos) continue;
                        cacheEntry.partidos.forEach(p => {
                            if (p.local === fav.nombre || p.visitante === fav.nombre) {
                                if (!todosPartidos.find(x => x.id === p.id)) todosPartidos.push({ ...p, _deporteId: fav.deporteId });
                            }
                        });
                    }
                    todosPartidos.sort((a, b) => { const order = { live: 0, scheduled: 1, finished: 2 }; return (order[a.claseEstado] || 3) - (order[b.claseEstado] || 3); });
                    const enVivo = todosPartidos.filter(p => p.claseEstado === 'live').length;
                    const finalizados = todosPartidos.filter(p => p.claseEstado === 'finished').length;
                    const programados = todosPartidos.filter(p => p.claseEstado === 'scheduled').length;
                    if (summaryBar) summaryBar.innerHTML = `<span class="summary-item"><span class="summary-dot live-dot"></span> ${enVivo} en vivo</span><span class="summary-item"><span class="summary-dot fin-dot"></span> ${finalizados} finalizados</span><span class="summary-item"><span class="summary-dot sched-dot"></span> ${programados} programados</span><span class="summary-item" style="margin-left:8px;">| ${favEquipos.length} equipos favoritos</span>`;
                    if (!todosPartidos.length) { contenedor.innerHTML = `<div class="empty"><i class="fa-regular fa-futbol"></i><p>Tus equipos favoritos no tienen partidos ahora.</p></div>`; return; }
                    contenedor.innerHTML = todosPartidos.map(p => {
                        const esFavLocal = FavManager.esFavorito(p._deporteId, p.local);
                        const esFavVisitante = FavManager.esFavorito(p._deporteId, p.visitante);
                        const localLogoHtml = p.localLogo ? `<img class="team-logo" src="${p.localLogo}" alt="" onerror="this.style.display='none'">` : '';
                        const visitanteLogoHtml = p.visitanteLogo ? `<img class="team-logo" src="${p.visitanteLogo}" alt="" onerror="this.style.display='none'">` : '';
                        return `<div class="match-card" data-match-id="${p.id}" data-deporte-id="${p._deporteId}">
                            <div class="match-main">
                                <div class="team-block home"><button class="fav-star-btn${esFavLocal ? ' is-fav' : ''}" data-deporte="${p._deporteId}" data-equipo="${Util.escaparHTML(p.local)}"><i class="fa-solid fa-star"></i></button>${localLogoHtml}<span class="team-name">${Util.escaparHTML(p.local)}</span></div>
                                <div class="score-box${p.claseEstado === 'live' ? ' live-score' : ''}">${p.scoreLocal} - ${p.scoreVisitante}</div>
                                <div class="team-block away"><span class="team-name">${Util.escaparHTML(p.visitante)}</span>${visitanteLogoHtml}<button class="fav-star-btn${esFavVisitante ? ' is-fav' : ''}" data-deporte="${p._deporteId}" data-equipo="${Util.escaparHTML(p.visitante)}"><i class="fa-solid fa-star"></i></button></div>
                                <span class="state-badge ${p.claseEstado}">${p.textoEstado}</span>
                            </div>
                            <div class="match-detail"><span class="detail-chip"><i class="fa-solid ${Util.obtenerDeporte(p._deporteId)?.icon || 'fa-trophy'}"></i> ${Util.obtenerDeporte(p._deporteId)?.nombre || 'Deporte'}</span>${p.sede ? `<span class="detail-chip"><i class="fa-solid fa-location-dot"></i> ${Util.escaparHTML(p.sede)}</span>` : ''}</div>
                        </div>`;
                    }).join('');
                },
                refrescarTodo() {
                    if (STATE.deporteActivo === '__favoritos__') { this.renderizarFavoritos(); CONFIG.DEPORTES.forEach(d => { if (!CacheManager.esValido(d.id)) this.cargarDeporte(d.id, true); }); } 
                    else { this.cargarDeporte(STATE.deporteActivo, true); CONFIG.DEPORTES.forEach(d => { if (d.id !== STATE.deporteActivo && !CacheManager.esValido(d.id)) this.cargarDeporte(d.id, true); }); }
                    Ticker.actualizar();
                    DOM.liveTime.textContent = `Actualizado: ${Util.formatearHora()}`;
                },
                async iniciar() {
                    FavManager.cargar();
                    UIBuilder.construirNavegacion();
                    UIBuilder.construirPaneles();
                    DOM.liveTime.textContent = `Actualizado: ${Util.formatearHora()}`;
                    await this.cargarDeporte(STATE.deporteActivo);
                    setTimeout(() => { CONFIG.DEPORTES.forEach(d => { if (d.id !== STATE.deporteActivo) this.cargarDeporte(d.id); }); }, 2000);
                    setInterval(() => this.refrescarTodo(), CONFIG.INTERVALO_REFRESCO);
                    setInterval(() => { DOM.liveTime.textContent = `Actualizado: ${Util.formatearHora()}`; }, 1000);
                    setInterval(() => Ticker.actualizar(), CONFIG.INTERVALO_TICKER);
                },
            };

            window.TodoDeportes = {
                reintentar(deporteId) { const loader = document.getElementById('loader-' + deporteId); if (loader) loader.style.display = 'flex'; const contenedor = document.getElementById('partidos-' + deporteId); if (contenedor) contenedor.innerHTML = ''; App.cargarDeporte(deporteId, true); },
                reintentarStandings(deporteId) { const loader = document.getElementById('loader-standings-' + deporteId); if (loader) loader.style.display = 'flex'; const contenedor = document.getElementById('standings-' + deporteId); if (contenedor) contenedor.innerHTML = ''; App.cargarStandings(deporteId); },
                reintentarNoticias(deporteId) { const loader = document.getElementById('loader-news-' + deporteId); if (loader) loader.style.display = 'flex'; const contenedor = document.getElementById('noticias-' + deporteId); if (contenedor) contenedor.innerHTML = ''; App.cargarNoticias(deporteId); },
                recargarTodo() { App.refrescarTodo(); },
            };

            document.addEventListener('DOMContentLoaded', () => App.iniciar());
        })();
    </script>
</body>
</html>
