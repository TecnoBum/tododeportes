<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Deportes – Resultados en vivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #f4f6f9;
            --surface: #ffffff;
            --surface2: #f0f2f5;
            --surface3: #e2e6eb;
            --text: #1a1a2e;
            --text2: #5a6470;
            --accent: #3b82f6;
            --accent2: #2563eb;
            --live: #e11d48;
            --live-bg: #ffe4e6;
            --live-text: #9f1239;
            --fin: #0d9488;
            --fin-bg: #ccfbf1;
            --fin-text: #115e59;
            --sched: #d97706;
            --sched-bg: #fef3c7;
            --sched-text: #92400e;
            --border: #dde1e6;
            --radius: 14px;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            --transition: 0.2s ease;
            --ticker-bg: #e9ecf0;
            --ticker-text: #1e293b;
            --gold: #f59e0b;
            --gold-bg: #fffbeb;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.5;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 120;
            backdrop-filter: blur(12px);
            gap: 12px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            flex-shrink: 0;
        }
        .brand i {
            color: var(--accent);
            font-size: 1.4rem;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.75rem;
            color: var(--text2);
            background: var(--surface2);
            padding: 5px 12px;
            border-radius: 20px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--live);
            animation: pulse 1.8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7);
            }
            50% {
                opacity: 0.5;
                box-shadow: 0 0 0 10px rgba(225, 29, 72, 0);
            }
        }
        .ticker-wrap {
            background: var(--ticker-bg);
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            position: sticky;
            top: 55px;
            z-index: 110;
            height: 34px;
            display: flex;
            align-items: center;
        }
        .ticker-label {
            background: var(--live);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 6px 14px;
            z-index: 2;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            height: 100%;
        }
        .ticker-label i {
            font-size: 0.65rem;
        }
        .ticker-track {
            display: flex;
            animation: tickerScroll 25s linear infinite; /* Más rápido */
            white-space: nowrap;
            gap: 4px;
            align-items: center;
            height: 100%;
        }
        .ticker-track:hover {
            animation-play-state: paused;
        }
        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }
        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 14px;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            letter-spacing: -0.2px;
            color: var(--ticker-text);
        }
        .ticker-item .score-mini {
            color: var(--live);
            font-weight: 700;
        }
        .ticker-item .dot-sep {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--text2);
            opacity: 0.5;
        }
        .sport-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            white-space: nowrap;
            padding: 7px 14px;
            display: flex;
            gap: 5px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            position: sticky;
            top: 89px;
            z-index: 100;
        }
        .sport-nav::-webkit-scrollbar {
            display: none;
        }
        .sport-tab {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            border-radius: 22px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text2);
            background: transparent;
            border: 1px solid transparent;
            transition: all var(--transition);
            flex-shrink: 0;
            letter-spacing: -0.2px;
        }
        .sport-tab:hover {
            background: var(--surface2);
            color: #000;
        }
        .sport-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 700;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.35);
        }
        .sport-tab.fav-tab {
            color: var(--gold);
            border-color: transparent;
        }
        .sport-tab.fav-tab.active {
            background: var(--gold);
            color: #fff;
            border-color: var(--gold);
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4);
        }
        .sport-tab i {
            font-size: 0.95rem;
            width: 18px;
            text-align: center;
        }
        /* Sub-navegación */
        .sub-nav {
            display: flex;
            gap: 4px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .sub-tab {
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .sub-tab:hover {
            background: var(--surface2);
            border-color: var(--accent);
        }
        .sub-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 700;
        }
        .main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 16px;
        }
        .panel {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .panel.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .panel-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
        }
        .section-title i {
            color: var(--accent);
            font-size: 1.3rem;
        }
        .filter-group {
            display: flex;
            gap: 4px;
            margin-left: auto;
            background: var(--surface2);
            border-radius: 20px;
            padding: 3px;
        }
        .filter-btn {
            padding: 6px 14px;
            border-radius: 18px;
            border: none;
            background: transparent;
            color: var(--text2);
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .filter-btn.active {
            background: var(--accent);
            color: #fff;
        }
        .summary-bar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            font-size: 0.75rem;
            color: var(--text2);
        }
        .summary-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .summary-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .summary-dot.live-dot {
            background: var(--live);
        }
        .summary-dot.fin-dot {
            background: var(--fin);
        }
        .summary-dot.sched-dot {
            background: var(--sched);
        }
        .match-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .match-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }
        .match-card.flash-update {
            animation: flashBorder 2s ease-out;
        }
        @keyframes flashBorder {
            0% {
                border-color: var(--accent);
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            }
            100% {
                border-color: var(--border);
                box-shadow: none;
            }
        }
        /* Nuevo diseño de fila de equipos con logos y estrellas */
        .match-main {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .team-block {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        .team-block.home {
            justify-content: flex-end;
        }
        .team-block.away {
            justify-content: flex-start;
        }
        .team-logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
            flex-shrink: 0;
        }
        .team-name {
            font-weight: 600;
            font-size: 0.92rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .fav-star-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: #ccc;
            transition: all 0.2s;
            padding: 0 4px;
            display: inline-flex;
            align-items: center;
            flex-shrink: 0;
        }
        .fav-star-btn:hover {
            color: var(--gold);
            transform: scale(1.2);
        }
        .fav-star-btn.is-fav {
            color: var(--gold);
        }
        .score-box {
            font-size: 1.45rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-align: center;
            min-width: 72px;
            background: var(--surface2);
            border-radius: 10px;
            padding: 7px 4px;
            color: var(--text);
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .score-box.live-score {
            background: #ffe4e6;
            color: var(--live);
            animation: pulseScore 2s ease-in-out infinite;
        }
        @keyframes pulseScore {
            0%,
            100% {
                color: #1a1a2e;
            }
            50% {
                color: var(--live);
            }
        }
        .state-badge {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 5px 11px;
            border-radius: 20px;
            white-space: nowrap;
            text-align: center;
            min-width: 60px;
            flex-shrink: 0;
        }
        .state-badge.live {
            background: var(--live-bg);
            color: var(--live-text);
        }
        .state-badge.finished {
            background: var(--fin-bg);
            color: var(--fin-text);
        }
        .state-badge.scheduled {
            background: var(--sched-bg);
            color: var(--sched-text);
        }
        .match-detail {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--text2);
            gap: 10px;
            flex-wrap: wrap;
        }
        .match-card.expanded .match-detail {
            display: flex;
        }
        .detail-chip {
            background: var(--surface2);
            padding: 6px 12px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            color: var(--text);
        }
        .detail-chip i {
            color: var(--accent);
            font-size: 0.75rem;
        }
        /* Estadísticas dentro del detalle */
        .stats-mini {
            width: 100%;
            margin-top: 6px;
            font-size: 0.72rem;
            background: var(--surface2);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }
        .stats-mini .stat-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1 1 180px;
            min-width: 150px;
        }
        .stats-mini .stat-bar-wrap {
            flex: 1;
            height: 6px;
            background: var(--surface3);
            border-radius: 3px;
            overflow: hidden;
        }
        .stats-mini .stat-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .stats-mini .stat-val {
            font-weight: 700;
            min-width: 24px;
            text-align: center;
            font-size: 0.8rem;
        }
        .stats-mini .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text2);
            min-width: 50px;
        }
        /* Tabla de posiciones */
        .standings-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .standings-table th {
            background: var(--surface2);
            padding: 10px 8px;
            text-align: left;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--text2);
        }
        .standings-table td {
            padding: 9px 8px;
            border-top: 1px solid var(--border);
            font-weight: 500;
        }
        .standings-table .pos {
            width: 30px;
            text-align: center;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .standings-table .pos.zona-ucl {
            color: #2563eb;
        }
        .standings-table .pos.zona-descenso {
            color: #e11d48;
        }
        .standings-table tr:hover td {
            background: #f8fafc;
        }
        .standings-table .team-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .standings-table .team-cell img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        .standings-table .pts {
            font-weight: 800;
            text-align: center;
        }
        /* Noticias */
        .news-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
        }
        .news-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }
        .news-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            object-position: center;
            display: block;
            background: var(--surface2);
        }
        .news-img-placeholder {
            width: 100%;
            height: 180px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text2);
            font-size: 2.2rem;
        }
        .news-content {
            padding: 16px 18px;
            flex: 1;
        }
        .news-card .news-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 6px;
            line-height: 1.3;
            color: var(--text);
        }
        .news-card .news-meta {
            font-size: 0.7rem;
            color: var(--text2);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .news-card .news-desc {
            font-size: 0.75rem;
            color: var(--text2);
            margin-top: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .loader {
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .empty {
            text-align: center;
            padding: 50px 20px;
            color: var(--text2);
        }
        .empty i {
            font-size: 2.6rem;
            display: block;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .empty p {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .retry-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 22px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            font-size: 0.82rem;
            transition: background var(--transition);
        }
        .retry-btn:hover {
            background: var(--accent2);
        }
        .sub-content {
            display: none;
        }
        .sub-content.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        @media (max-width: 768px) {
            .header {
                padding: 10px 14px;
            }
            .brand {
                font-size: 1.1rem;
            }
            .ticker-wrap {
                top: 49px;
            }
            .sport-nav {
                top: 83px;
                padding: 5px 8px;
            }
            .sport-tab {
                padding: 7px 12px;
                font-size: 0.75rem;
                gap: 5px;
            }
            .main {
                padding: 10px;
            }
            .match-main {
                flex-wrap: wrap;
                justify-content: center;
            }
            .team-block.home, .team-block.away {
                flex: 1 0 40%;
                justify-content: flex-start;
            }
            .team-block.home {
                order: 1;
            }
            .score-box {
                order: 2;
            }
            .team-block.away {
                order: 3;
            }
            .state-badge {
                order: 4;
                margin-top: 6px;
            }
            .team-name {
                font-size: 0.8rem;
            }
            .score-box {
                font-size: 1.2rem;
                min-width: 58px;
                padding: 5px 2px;
            }
            .filter-group {
                margin-left: 0;
                margin-top: 6px;
            }
            .standings-table {
                font-size: 0.68rem;
            }
            .standings-table th,
            .standings-table td {
                padding: 6px 4px;
            }
            .news-card img,
            .news-img-placeholder {
                height: 160px;
            }
            .news-content {
                padding: 14px;
            }
            .stats-mini .stat-row {
                flex: 1 1 100%;
            }
        }
        @media (max-width: 420px) {
            .sport-tab {
                padding: 6px 10px;
                font-size: 0.68rem;
            }
            .match-card {
                padding: 10px 8px;
            }
            .team-name {
                font-size: 0.72rem;
            }
            .score-box {
                font-size: 1rem;
                min-width: 48px;
            }
            .ticker-track {
                animation-duration: 18s; /* incluso más rápido en móvil */
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand">
            <span>Todo Deportes</span>
        </div>
        <div class="header-right">
            <span class="live-indicator">
                <span class="live-dot"></span>
                <span id="liveTime">Actualizando…</span>
            </span>
        </div>
    </header>

    <div class="ticker-wrap" id="tickerWrap">
        <span class="ticker-label" id="tickerLabel"><i class="fa-solid fa-bolt"></i> EN VIVO</span>
        <div class="ticker-track" id="tickerTrack"></div>
    </div>

    <nav class="sport-nav" id="sportNav"></nav>

    <main class="main" id="mainContent"></main>

    <script>
        (function() {
            const CONFIG = {
                INTERVALO_REFRESCO: 35000,
                VIDA_CACHE: 30000,
                VIDA_CACHE_STANDINGS: 120000,
                VIDA_CACHE_NEWS: 180000,
                INTERVALO_TICKER: 20000,
                API_BASE: 'https://site.api.espn.com/apis/site/v2/sports',
                DEPORTES: [
                    { id: 'baseball-mlb', nombre: 'MLB', icon: 'fa-baseball', sport: 'baseball',
                        league: 'mlb', pais: 'EE.UU.', tieneStandings: true },
                    { id: 'football-nfl', nombre: 'NFL', icon: 'fa-football', sport: 'football',
                        league: 'nfl', pais: 'EE.UU.', tieneStandings: true },
                    { id: 'basketball-nba', nombre: 'NBA', icon: 'fa-basketball', sport: 'basketball',
                        league: 'nba', pais: 'EE.UU.', tieneStandings: true },
                    { id: 'hockey-nhl', nombre: 'NHL', icon: 'fa-hockey-puck', sport: 'hockey',
                        league: 'nhl', pais: 'EE.UU.', tieneStandings: true },
                    { id: 'soccer-epl', nombre: 'Premier League', icon: 'fa-futbol', sport: 'soccer',
                        league: 'eng.1', pais: 'Inglaterra', tieneStandings: true },
                    { id: 'soccer-laliga', nombre: 'LaLiga', icon: 'fa-futbol', sport: 'soccer',
                        league: 'esp.1', pais: 'España', tieneStandings: true },
                    { id: 'soccer-seriea', nombre: 'Serie A', icon: 'fa-futbol', sport: 'soccer',
                        league: 'ita.1', pais: 'Italia', tieneStandings: true },
                    { id: 'soccer-bundesliga', nombre: 'Bundesliga', icon: 'fa-futbol', sport: 'soccer',
                        league: 'ger.1', pais: 'Alemania', tieneStandings: true },
                    { id: 'soccer-ligue1', nombre: 'Ligue 1', icon: 'fa-futbol', sport: 'soccer',
                        league: 'fra.1', pais: 'Francia', tieneStandings: true },
                    { id: 'soccer-mls', nombre: 'MLS', icon: 'fa-futbol', sport: 'soccer', league: 'usa.1',
                        pais: 'EE.UU.', tieneStandings: true },
                    { id: 'soccer-ucl', nombre: 'Champions League', icon: 'fa-trophy', sport: 'soccer',
                        league: 'uefa.champions', pais: 'Europa', tieneStandings: true },
                    { id: 'tennis-atp', nombre: 'ATP Tenis', icon: 'fa-tennis', sport: 'tennis',
