<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Todo Deportes – Resultados en vivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #f4f6f9;
            --surface: #ffffff;
            --surface2: #f0f2f5;
            --surface3: #e2e6eb;
            --text: #1a1a2e;
            --text2: #5a6470;
            --accent: #3b82f6;
            --accent2: #2563eb;
            --live: #e11d48;
            --live-bg: #ffe4e6;
            --live-text: #9f1239;
            --fin: #0d9488;
            --fin-bg: #ccfbf1;
            --fin-text: #115e59;
            --sched: #d97706;
            --sched-bg: #fef3c7;
            --sched-text: #92400e;
            --border: #dde1e6;
            --radius: 14px;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            --transition: 0.2s ease;
            --ticker-bg: #e9ecf0;
            --ticker-text: #1e293b;
            --gold: #f59e0b;
            --gold-bg: #fffbeb;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.4;
        }
        /* Header mejorado para móvil */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 120;
            backdrop-filter: blur(12px);
            gap: 12px;
            min-height: 56px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .brand i {
            color: var(--accent);
            font-size: 1.3rem;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: var(--text2);
            background: var(--surface2);
            padding: 5px 12px;
            border-radius: 24px;
            white-space: nowrap;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--live);
            animation: pulse 1.8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.6); }
            50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(225, 29, 72, 0); }
        }
        /* Ticker mejorado para móvil */
        .ticker-wrap {
            background: var(--ticker-bg);
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            position: sticky;
            top: 56px;
            z-index: 110;
            display: flex;
            align-items: center;
            min-height: 40px;
        }
        .ticker-label {
            background: var(--live);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 14px;
            z-index: 2;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            height: 40px;
        }
        .ticker-track {
            display: flex;
            animation: tickerScroll 25s linear infinite;
            white-space: nowrap;
            gap: 4px;
            align-items: center;
            height: 40px;
            will-change: transform;
        }
        .ticker-track:hover {
            animation-play-state: paused;
        }
        @keyframes tickerScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0 16px;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            letter-spacing: -0.2px;
            color: var(--ticker-text);
            height: 40px;
        }
        .ticker-item .score-mini {
            color: var(--live);
            font-weight: 800;
        }
        /* Navegación de deportes: táctil + scroll suave */
        .sport-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            white-space: nowrap;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            position: sticky;
            top: 96px;
            z-index: 100;
            scroll-behavior: smooth;
        }
        .sport-nav::-webkit-scrollbar {
            height: 3px;
        }
        .sport-nav::-webkit-scrollbar-track {
            background: var(--surface2);
            border-radius: 4px;
        }
        .sport-nav::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }
        .sport-tab {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text2);
            background: var(--surface2);
            border: 1px solid transparent;
            transition: all 0.2s ease;
            flex-shrink: 0;
            letter-spacing: -0.2px;
            min-height: var(--touch-target);
        }
        .sport-tab:active {
            transform: scale(0.96);
            background: var(--surface3);
        }
        .sport-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .sport-tab.fav-tab.active {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        .sport-tab i {
            font-size: 1rem;
            width: 20px;
            text-align: center;
        }
        /* Sub navegación (Partidos / Tabla / Noticias) */
        .sub-nav {
            display: flex;
            gap: 8px;
            margin: 12px 0 16px 0;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 0 2px 4px 2px;
        }
        .sub-nav::-webkit-scrollbar {
            display: none;
        }
        .sub-tab {
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
            min-height: var(--touch-target);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .sub-tab:active {
            transform: scale(0.96);
        }
        .sub-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        /* Main y paneles */
        .main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 12px;
        }
        .panel {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .panel.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .filter-group {
            display: flex;
            gap: 8px;
            margin: 12px 0 10px 0;
            background: transparent;
            border-radius: 0;
            padding: 0;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 38px;
        }
        .filter-btn:active {
            transform: scale(0.96);
        }
        .filter-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .summary-bar {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            margin: 12px 0 10px 0;
            font-size: 0.75rem;
            color: var(--text2);
            background: var(--surface2);
            padding: 8px 14px;
            border-radius: 32px;
        }
        .summary-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        .summary-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        /* Tarjetas de partido - versión móvil optimizada */
        .match-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .match-card:active {
            transform: scale(0.99);
            background: var(--surface2);
        }
        .match-card.flash-update {
            animation: flashBorder 2s ease-out;
        }
        @keyframes flashBorder {
            0% { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); }
            100% { border-color: var(--border); box-shadow: none; }
        }
        /* Layout de marcador centrado pero adaptado */
        .match-main {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-align: center;
        }
        .team-block {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 120px;
            justify-content: center;
        }
        .team-block.home {
            justify-content: flex-end;
        }
        .team-block.away {
            justify-content: flex-start;
        }
        .team-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
            flex-shrink: 0;
        }
        .team-name {
            font-weight: 650;
            font-size: 0.95rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 150px;
        }
        /* Estrella favoritos: área táctil amplia */
        .fav-star-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #cbd5e1;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            flex-shrink: 0;
        }
        .fav-star-btn:active {
            transform: scale(0.9);
            background: var(--surface2);
        }
        .fav-star-btn.is-fav {
            color: var(--gold);
        }
        .score-box {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-align: center;
            min-width: 90px;
            background: var(--surface2);
            border-radius: 20px;
            padding: 8px 12px;
            color: var(--text);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .score-box.live-score {
            background: var(--live-bg);
            color: var(--live);
            animation: pulseScore 2s ease-in-out infinite;
        }
        @keyframes pulseScore {
            0%, 100% { background: var(--live-bg); color: var(--live); }
            50% { background: #ffccd5; color: #be123c; }
        }
        .state-badge {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 6px 14px;
            border-radius: 30px;
            white-space: nowrap;
            text-align: center;
            min-width: 80px;
            flex-shrink: 0;
        }
        .state-badge.live {
            background: var(--live-bg);
            color: var(--live-text);
        }
        .state-badge.finished {
            background: var(--fin-bg);
            color: var(--fin-text);
        }
        .state-badge.scheduled {
            background: var(--sched-bg);
            color: var(--sched-text);
        }
        /* Detalles expandidos */
        .match-detail {
            display: none;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text2);
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .match-card.expanded .match-detail {
            display: flex;
        }
        .detail-chip {
            background: var(--surface2);
            padding: 6px 12px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            color: var(--text);
            font-size: 0.7rem;
        }
        .stats-mini {
            width: 100%;
            margin-top: 8px;
            font-size: 0.7rem;
            background: var(--surface2);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .stats-mini .stat-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .stats-mini .stat-bar-wrap {
            flex: 1;
            height: 8px;
            background: var(--surface3);
            border-radius: 4px;
            overflow: hidden;
        }
        .stats-mini .stat-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
        }
        .stats-mini .stat-val {
            font-weight: 700;
            min-width: 28px;
            text-align: center;
        }
        /* Tablas y noticias adaptadas */
        .standings-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            background: var(--surface);
            border-radius: var(--radius);
            overflow-x: auto;
            display: block;
        }
        .standings-table th, .standings-table td {
            padding: 10px 6px;
            text-align: left;
        }
        .news-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .news-card:active {
            transform: scale(0.98);
        }
        .news-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }
        .news-content {
            padding: 14px;
        }
        .news-title {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        /* Mobile First mejoras */
        @media (max-width: 768px) {
            .header {
                padding: 8px 12px;
                top: 0;
            }
            .ticker-wrap {
                top: 56px;
            }
            .sport-nav {
                top: 96px;
                padding: 6px 10px;
                gap: 6px;
            }
            .sport-tab {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .team-name {
                font-size: 0.85rem;
                max-width: 130px;
            }
            .team-logo {
                width: 28px;
                height: 28px;
            }
            .score-box {
                font-size: 1.4rem;
                min-width: 80px;
                padding: 6px 10px;
            }
            .state-badge {
                font-size: 0.65rem;
                padding: 4px 10px;
                min-width: 70px;
            }
            .match-main {
                gap: 8px;
            }
            .team-block {
                gap: 5px;
                min-width: 100px;
            }
            .fav-star-btn {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            .sub-tab {
                padding: 8px 16px;
                font-size: 0.75rem;
            }
            .filter-btn {
                padding: 6px 14px;
                font-size: 0.7rem;
            }
        }
        @media (max-width: 600px) {
            .match-main {
                flex-direction: column;
                align-items: stretch;
            }
            .team-block {
                justify-content: space-between !important;
                width: 100%;
            }
            .team-block.home, .team-block.away {
                justify-content: space-between;
            }
            .team-name {
                white-space: normal;
                word-break: break-word;
                text-align: left;
                max-width: 180px;
                font-size: 0.9rem;
            }
            .score-box {
                order: 1;
                margin: 6px auto;
                width: fit-content;
            }
            .state-badge {
                order: 2;
                margin: 0 auto;
            }
            .match-main .team-block:first-child {
                order: 0;
            }
            .match-main .team-block:last-child {
                order: 3;
            }
            .ticker-item {
                font-size: 0.7rem;
                padding: 0 12px;
                gap: 4px;
            }
            .ticker-label {
                padding: 0 10px;
                font-size: 0.65rem;
            }
            .standings-table {
                font-size: 0.7rem;
            }
        }
        @media (max-width: 480px) {
            .team-name {
                font-size: 0.8rem;
                max-width: 140px;
            }
            .team-logo {
                width: 24px;
                height: 24px;
            }
            .score-box {
                font-size: 1.2rem;
                min-width: 70px;
                padding: 4px 8px;
            }
            .detail-chip {
                font-size: 0.65rem;
                padding: 5px 10px;
            }
            .sub-tab {
                padding: 6px 12px;
            }
        }
        .empty {
            text-align: center;
            padding: 40px 16px;
            color: var(--text2);
        }
        .loader {
            display: flex;
            justify-content: center;
            padding: 32px;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .retry-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        .sub-content {
            display: none;
        }
        .sub-content.active {
            display: block;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="brand">
        <i class="fa-solid fa-futbol"></i>
        <span>Todo Deportes</span>
    </div>
    <div class="header-right">
        <span class="live-indicator">
            <span class="live-dot"></span>
            <span id="liveTime">Actualizando…</span>
        </span>
    </div>
</header>

<div class="ticker-wrap" id="tickerWrap">

    <div class="ticker-track" id="tickerTrack"></div>
</div>

<nav class="sport-nav" id="sportNav"></nav>
<main class="main" id="mainContent"></main>

            actualizar() { const enVivo = []; for (const [deporteId, entry] of Object.entries(STATE.cache)) { const deporte = Util.obtenerDeporte(deporteId); if (!deporte || !entry?.partidos) continue; entry.partidos.filter(p => p.claseEstado === 'live').forEach(p => { enVivo.push({ ...p, deporteNombre: deporte.nombre, deporteIcon: deporte.icon }); }); } if (enVivo.length === 0) { let finalizados = []; for (const [deporteId, entry] of Object.entries(STATE.cache)) { const deporte = Util.obtenerDeporte(deporteId); if (!deporte || !entry?.partidos) continue; entry.partidos.filter(p => p.claseEstado === 'finished').forEach(p => { finalizados.push({ ...p, deporteNombre: deporte.nombre, deporteIcon: deporte.icon }); }); } if (finalizados.length > 0) { DOM.tickerLabel.innerHTML = '<i class="fa-solid fa-clock-rotate-left"></i> RESULTADOS'; const items = finalizados.slice(0, 20).map(p => `<span class="ticker-item"><i class="fa-solid ${p.deporteIcon}"></i><span>${p.deporteNombre}</span><span class="dot-sep" style="margin:0 4px">•</span><span>${Util.escaparHTML(p.local)}</span><span class="score-mini">${p.scoreLocal}-${p.scoreVisitante}</span><span>${Util.escaparHTML(p.visitante)}</span><span class="dot-sep" style="margin:0 4px">•</span><span>Finalizado</span></span>`).join(''); DOM.tickerTrack.innerHTML = items + items; return; } DOM.tickerLabel.innerHTML = '<i class="fa-solid fa-bolt"></i> EN VIVO'; DOM.tickerTrack.innerHTML = '<span class="ticker-item">⏱️ No hay partidos en vivo ahora</span>'; return; } DOM.tickerLabel.innerHTML = '<i class="fa-solid fa-bolt"></i> EN VIVO'; const items = enVivo.map(p => `<span class="ticker-item"><i class="fa-solid ${p.deporteIcon}"></i><span>${p.deporteNombre}</span><span class="dot-sep">•</span><span>${Util.escaparHTML(p.local)}</span><span class="score-mini">${p.scoreLocal}-${p.scoreVisitante}</span><span>${Util.escaparHTML(p.visitante)}</span><span class="dot-sep">•</span><span>${p.textoEstado}</span></span>`).join(''); DOM.tickerTrack.innerHTML = items + items; },
        };
        const App = {
            async cargarDeporte(deporteId, forzar = false) { if (deporteId === '__favoritos__') { this.renderizarFavoritos(); return; } const deporte = Util.obtenerDeporte(deporteId); if (!deporte) return; const cacheEntry = CacheManager.obtener(deporteId); const loader = document.getElementById('loader-' + deporteId); if (!forzar && CacheManager.esValido(deporteId)) { UIBuilder.renderizarPartidos(deporteId, cacheEntry.partidos, cacheEntry.cambiados || new Set()); if (loader) loader.style.display = 'none'; return; } if (!cacheEntry || forzar) { if (loader) loader.style.display = 'flex'; const contenedor = document.getElementById('partidos-' + deporteId); if (contenedor && forzar) contenedor.innerHTML = ''; } try { const data = await API.obtenerDatos(deporte); const partidos = API.procesarEventos(data); CacheManager.guardar(deporteId, partidos); const entry = CacheManager.obtener(deporteId); UIBuilder.renderizarPartidos(deporteId, partidos, entry?.cambiados || new Set()); Ticker.actualizar(); } catch(err) { console.warn(`Error en ${deporte.nombre}:`, err.message); if (cacheEntry && cacheEntry.partidos.length) UIBuilder.renderizarPartidos(deporteId, cacheEntry.partidos); else UIBuilder.mostrarError(deporteId, 'No se pudieron cargar los datos. Verifica tu conexión.'); } },
            async cargarStandings(deporteId) { if (deporteId === '__favoritos__') return; const deporte = Util.obtenerDeporte(deporteId); if (!deporte || !deporte.tieneStandings) return; const cacheEntry = CacheManager.obtenerStandings(deporteId); const loader = document.getElementById('loader-standings-' + deporteId); if (CacheManager.esValidoStandings(deporteId)) { UIBuilder.renderizarStandings(deporteId, cacheEntry.grupos); if (loader) loader.style.display = 'none'; return; } if (loader) loader.style.display = 'flex'; try { const data = await API.obtenerStandings(deporte); const grupos = API.procesarStandings(data); CacheManager.guardarStandings(deporteId, grupos); UIBuilder.renderizarStandings(deporteId, grupos); } catch(err) { if (cacheEntry && cacheEntry.grupos) UIBuilder.renderizarStandings(deporteId, cacheEntry.grupos); else UIBuilder.mostrarErrorStandings(deporteId, 'No se pudo cargar la tabla.'); } },
            async cargarNoticias(deporteId) { if (deporteId === '__favoritos__') return; const deporte = Util.obtenerDeporte(deporteId); if (!deporte) return; const cacheEntry = CacheManager.obtenerNoticias(deporteId); const loader = document.getElementById('loader-news-' + deporteId); if (CacheManager.esValidoNoticias(deporteId)) { UIBuilder.renderizarNoticias(deporteId, cacheEntry.noticias); if (loader) loader.style.display = 'none'; return; } if (loader) loader.style.display = 'flex'; try { const data = await API.obtenerNoticias(deporte); const noticias = API.procesarNoticias(data); CacheManager.guardarNoticias(deporteId, noticias); UIBuilder.renderizarNoticias(deporteId, noticias); } catch(err) { if (cacheEntry && cacheEntry.noticias) UIBuilder.renderizarNoticias(deporteId, cacheEntry.noticias); else UIBuilder.mostrarErrorNoticias(deporteId, 'No se pudieron cargar las noticias.'); } },
            async cargarStatsEvento(deporteId, eventId, cardElement) { const chip = cardElement?.querySelector(`#stats-chip-${eventId}`); if (!chip || chip.querySelector('.stats-mini')) return; const cacheEntry = CacheManager.obtenerStatsEvento(eventId); if (cacheEntry) { UIBuilder.renderizarStatsEnChip(eventId, cacheEntry.data, cardElement); return; } const deporte = Util.obtenerDeporte(deporteId); if (!deporte) { if (chip) chip.innerHTML = '<i class="fa-solid fa-chart-pie"></i> Estadísticas no disponibles'; return; } try { const data = await API.obtenerResumenEvento(deporte, eventId); CacheManager.guardarStatsEvento(eventId, data); UIBuilder.renderizarStatsEnChip(eventId, data, cardElement); } catch(err) { if (chip) chip.innerHTML = '<i class="fa-solid fa-chart-pie"></i> Estadísticas no disponibles'; } },
            renderizarFavoritos() { const contenedor = document.getElementById('partidos-__favoritos__'); const summaryBar = document.getElementById('summary-__favoritos__'); const favEquipos = FavManager.obtenerEquiposFavoritos(); if (!favEquipos.length) { if (summaryBar) summaryBar.innerHTML = ''; contenedor.innerHTML = `<div class="empty"><i class="fa-regular fa-star"></i><p>No tienes equipos favoritos.</p><p style="font-size:0.8rem;">Toca la estrella junto a un equipo para agregarlo.</p></div>`; return; } const todosPartidos = []; for (const fav of favEquipos) { const cacheEntry = STATE.cache[fav.deporteId]; if (!cacheEntry || !cacheEntry.partidos) continue; cacheEntry.partidos.forEach(p => { if (p.local === fav.nombre || p.visitante === fav.nombre) { if (!todosPartidos.find(x => x.id === p.id)) todosPartidos.push({ ...p, _deporteId: fav.deporteId }); } }); } todosPartidos.sort((a,b) => { const order = { live: 0, scheduled: 1, finished: 2 }; return (order[a.claseEstado] || 3) - (order[b.claseEstado] || 3); }); const enVivo = todosPartidos.filter(p => p.claseEstado === 'live').length, finalizados = todosPartidos.filter(p => p.claseEstado === 'finished').length, programados = todosPartidos.filter(p => p.claseEstado === 'scheduled').length; if (summaryBar) summaryBar.innerHTML = `<span class="summary-item"><span class="summary-dot live-dot"></span> ${enVivo} en vivo</span><span class="summary-item"><span class="summary-dot fin-dot"></span> ${finalizados} finalizados</span><span class="summary-item"><span class="summary-dot sched-dot"></span> ${programados} programados</span><span class="summary-item">⭐ ${favEquipos.length} favoritos</span>`; if (!todosPartidos.length) { contenedor.innerHTML = `<div class="empty"><i class="fa-regular fa-futbol"></i><p>Tus equipos favoritos no tienen partidos ahora.</p></div>`; return; } contenedor.innerHTML = todosPartidos.map(p => { const esFavLocal = FavManager.esFavorito(p._deporteId, p.local), esFavVisitante = FavManager.esFavorito(p._deporteId, p.visitante); return `<div class="match-card" data-match-id="${p.id}" data-deporte-id="${p._deporteId}"><div class="match-main"><div class="team-block home"><button class="fav-star-btn${esFavLocal ? ' is-fav' : ''}" data-deporte="${p._deporteId}" data-equipo="${Util.escaparHTML(p.local)}"><i class="fa-solid fa-star"></i></button>${p.localLogo ? `<img class="team-logo" src="${p.localLogo}" onerror="this.style.display='none'">` : ''}<span class="team-name">${Util.escaparHTML(p.local)}</span></div><div class="score-box${p.claseEstado === 'live' ? ' live-score' : ''}">${p.scoreLocal} - ${p.scoreVisitante}</div><div class="team-block away"><span class="team-name">${Util.escaparHTML(p.visitante)}</span>${p.visitanteLogo ? `<img class="team-logo" src="${p.visitanteLogo}" onerror="this.style.display='none'">` : ''}<button class="fav-star-btn${esFavVisitante ? ' is-fav' : ''}" data-deporte="${p._deporteId}" data-equipo="${Util.escaparHTML(p.visitante)}"><i class="fa-solid fa-star"></i></button></div><span class="state-badge ${p.claseEstado}">${p.textoEstado}</span></div><div class="match-detail"><span class="detail-chip"><i class="fa-solid ${Util.obtenerDeporte(p._deporteId)?.icon || 'fa-trophy'}"></i> ${Util.obtenerDeporte(p._deporteId)?.nombre || 'Deporte'}</span>${p.sede ? `<span class="detail-chip"><i class="fa-solid fa-location-dot"></i> ${Util.escaparHTML(p.sede)}</span>` : ''}</div></div>`; }).join(''); },
            refrescarTodo() { if (STATE.deporteActivo === '__favoritos__') { this.renderizarFavoritos(); CONFIG.DEPORTES.forEach(d => { if (!CacheManager.esValido(d.id)) this.cargarDeporte(d.id, true); }); } else { this.cargarDeporte(STATE.deporteActivo, true); CONFIG.DEPORTES.forEach(d => { if (d.id !== STATE.deporteActivo && !CacheManager.esValido(d.id)) this.cargarDeporte(d.id, true); }); } Ticker.actualizar(); DOM.liveTime.textContent = `Actualizado: ${Util.formatearHora()}`; },
            async iniciar() { FavManager.cargar(); UIBuilder.construirNavegacion(); UIBuilder.construirPaneles(); DOM.liveTime.textContent = `Actualizado: ${Util.formatearHora()}`; await this.cargarDeporte(STATE.deporteActivo); setTimeout(() => { CONFIG.DEPORTES.forEach(d => { if (d.id !== STATE.deporteActivo) this.cargarDeporte(d.id); }); }, 2000); setInterval(() => this.refrescarTodo(), CONFIG.INTERVALO_REFRESCO); setInterval(() => { DOM.liveTime.textContent = `Actualizado: ${Util.formatearHora()}`; }, 1000); setInterval(() => Ticker.actualizar(), CONFIG.INTERVALO_TICKER); },
        };
        window.TodoDeportes = { reintentar(deporteId) { App.cargarDeporte(deporteId, true); }, reintentarStandings(deporteId) { App.cargarStandings(deporteId); }, reintentarNoticias(deporteId) { App.cargarNoticias(deporteId); }, recargarTodo() { App.refrescarTodo(); } };
        document.addEventListener('DOMContentLoaded', () => App.iniciar());
    })();
</script>
